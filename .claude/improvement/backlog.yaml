    opened_on: 2026-05-13
    last_verified: 2026-05-13
    notes: |
      Source — perf-a11y agent follow-up on the hero-period-scroll-fade
      ship (commit pending). Non-blocking observation. Watch a few runs
      with the fade live, then drop the hint if no compositor jank
      surfaces.

