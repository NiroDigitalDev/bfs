  # ── Reference-scout typographic / motion backlog ──
  # These are distinctive moves identified by the scout but not yet
  # shipped. The scout reads this section each run to know what NOT to
  # re-suggest, and to know what's already on deck for picking.

  - id: optical-axis-scroll
    title: Variable-serif optical-size axis swap on scroll
    ship: |
      Pair Instrument Serif with a variable companion (Fraunces opsz)
      on the hero masthead only; bind opsz to scroll velocity so the
      title tightens on settle and loosens on fast scroll.
    severity: medium
    effort: L
    class: distinctive
    status: open
    opened_on: 2026-05-13
    last_verified: 2026-05-13
    notes: Reference — Family New York. Risk — variable font payload + CLS.

  - id: live-kerning-on-hover
    title: Live kerning / ligature swap on hovered display words
    ship: |
      On hovered display words (hero, chapter titles), swap to stylistic
      alternates and tighten letter-spacing within a 200px pointer
      radius. Once-on-enter swash reveal as the mobile equivalent.
    severity: medium
    effort: M
    class: distinctive
    status: open
    opened_on: 2026-05-13
    last_verified: 2026-05-13
    notes: Reference — Bureau Borsche. Risk — sub-pixel jitter; touch fallback.

  - id: errata-layer
    title: Sitewide errata layer (struck-through corrections, baseline-break)
    ship: |
      A few words per chapter rendered with <del>/<ins> corrections,
      baseline-shift errata, or margin pencil notes revealed on
      scroll-into-view. Editorial flourish that deepens the
      "proof being corrected" conceit.
    severity: medium
    effort: M
    class: distinctive
    status: open
    opened_on: 2026-05-13
    last_verified: 2026-05-13
    notes: |
      Reference — Pentagram editorial / Marina Willer. a11y — must use
      <del>/<ins> so screen readers announce the correction.

  - id: view-transitions-page-turn
    title: View Transitions API page-turn between chapters
    ship: |
      Use the View Transitions API to make chapter-to-chapter movement
      read as a literal page-turn (spine pivot, folio flips, marginalia
      cross-fade). Non-VT fallback re-typesets folio only;
      prefers-reduced-motion falls back to a hard cut.
    severity: medium
    effort: L
    class: distinctive
    status: open
    opened_on: 2026-05-13
    last_verified: 2026-05-13
    notes: |
      Reference — Locomotive. Highest single-move impact in the scout's
      backlog but also the biggest. Save for a ship with the headroom.

  - id: hero-type-instrumental
    title: Make hero type behave — variable-axis + italic-roman swap + ligature alternates
    ship: |
      Promote "Dark Matter." from set to typeset. Variable-axis grade
      tied to scrollY, italic-roman swap on pointer-over the wordmark,
      ligature alternates cycling on a slow loop. SplitText already
      handles per-char; the work is in the per-char interaction state
      machine.
    severity: high
    effort: L
    class: distinctive
    status: open
    opened_on: 2026-05-13
    last_verified: 2026-05-13
    notes: |
      Source — 2026-05 critic ("hero is the only display moment, and
      it is conservative"). Reference — Bureau Borsche. Strongest
      single-surface lift on Awwwards rubric.

