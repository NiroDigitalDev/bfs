  - id: magnetic-tilt-mq-subscription
    title: Magnetic + Tilt — subscribe to matchMedia change events and reset transforms on bail
    ship: |
      Magnetic (`src/components/magnetic.tsx:17-18`) and Tilt
      (`src/components/tilt.tsx:17-18`) read `(pointer: fine)` and
      `(prefers-reduced-motion: reduce)` once at mount. If the user
      toggles reduced-motion or hot-plugs a trackpad, the existing
      effect doesn't re-run and any `el.style.transform` set by the
      last pointer event sticks. Fix — subscribe to both
      `matchMedia(...).addEventListener("change", ...)` in the effect;
      on bail, clear `el.style.transform = ""` and the `--mx/--my`
      custom properties.
    severity: medium
    effort: S
    class: a11y
    status: open
    files:
      - src/components/magnetic.tsx:17-18
      - src/components/tilt.tsx:17-18
    opened_on: 2026-05-13
    last_verified: 2026-05-13
    notes: |
      Source — motion-a11y auditor 2026-05-13. Real correctness edge
      case (mid-session media-query flip) but very rare in practice.
      Score 9/18 — low rubric pick but cheap, isolated, and a
      defensible "do it because it's right" hygiene item.

