  - id: index-menu-scroll-lock-leak
    title: IndexMenu can leak body.overflow on unmount-while-open
    ship: |
      Add an unmount cleanup to src/components/index-menu.tsx that always
      clears document.body.style.overflow regardless of `open` state, so a
      remount or hot-reload while the menu is open doesn't strand the lock.
    severity: low
    effort: S
    class: hygiene
    status: open
    files:
      - src/components/index-menu.tsx:29-72
    opened_on: 2026-05-13
    last_verified: 2026-05-13
    notes: Found by perf-a11y on ship of index-menu-mobile-toc.

  - id: dialog-scroll-lock-shared
    title: Centralise body.overflow lock between IndexMenu and CartDrawer
    ship: |
      Both dialogs set/clear `document.body.style.overflow` directly. If
      both are open at once, the second one closing strips the lock the
      other still needs. Replace with a counted helper (lib/scroll-lock.ts
      with lock/unlock pair) so only the last-to-close clears the body
      style.
    severity: low
    effort: S
    class: hygiene
    status: open
    files:
      - src/components/index-menu.tsx:30-33
      - src/components/cart-drawer.tsx:89-98
    opened_on: 2026-05-13
    last_verified: 2026-05-13

