# Improvement-cycle backlog — source of truth for open work.
#
# IMPROVEMENTS.md is the prose history. This file is the working state.
# Every run: the historian VERIFIES each `open` item against current code
# before reporting. Items found "no longer real" are flipped to
# `status: closed-by-drift` with a verified-on date — never silently
# dropped. New follow-ups uncovered by a ship are appended here, not
# only buried in the prose log.
#
# Status values:
#   open               — still real, eligible to be picked as a focus
#   in-progress        — being shipped in the current run (transient)
#   shipped            — completed; should also appear in shipped.yaml
#   closed-by-drift    — verified as no longer real (already fixed
#                        elsewhere, removed, or scope evaporated)
#   wontfix            — explicitly declined; record the reason
#
# Severity: critical | high | medium | low
# Effort:   S (≤1h) | M (1–3h) | L (>3h)
# Class:    hygiene | a11y | seo | perf | distinctive | system
#
# Schema per item:
#   id:            unique kebab-case slug
#   title:         short imperative
#   ship:          one-line description of the concrete deliverable
#   severity:      …
#   effort:        …
#   class:         …
#   status:        …
#   files:         [list of file:line anchors as of opened_on]
#   opened_on:     ISO date
#   last_verified: ISO date (set by historian)
#   notes:         optional free text

version: 1
items:
