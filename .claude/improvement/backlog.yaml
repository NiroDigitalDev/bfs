  - id: hero-period-will-change-cleanup
    title: Drop `will-change: opacity` from .hero-period once effect is stable
    ship: |
      The hero-period scroll-fade (shipped this run) declared
      `will-change: opacity` to hint the compositor. `will-change` is
      best applied transiently — keeping it set permanently can pin
      the element to its own layer indefinitely and waste memory.
      Once the effect proves stable across browsers, either remove
      the declaration or scope it behind a hover/scroll-start trigger.
    severity: low
    effort: S
    class: perf
    status: open
    files:
