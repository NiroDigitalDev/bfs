  - id: pdp-customer-reviews-editorial-pull-quotes
    title: "PDP — customer reviews as editorial pull-quotes (no stars, no avatars, no dates)"
    commit: pending
    date: 2026-05-14
    surface: catalogue
    tags: [pdp, catalogue, system, reviews, pull-quotes, editorial-register, italic-serif, hairline-rule, blockquote, cite, reuse-strict, pullquote-vocabulary, cult-fig, pdp-press-chrome, per-product-data, product-type-extension, reveal, no-new-primitives, no-new-deps, no-new-fonts, no-new-keyframes, no-new-tokens, no-jsonld-aggregaterating, prefers-reduced-motion, task-driven]
    summary: "Adds a Reader's notes / Correspondence section to every /supplies/[id] PDP — 3 BFS-voice editorial pull-quotes per product (18 total) set in the existing .pullquote vocabulary from the homepage cult section, mounted between Dispatch & care and Related editions. The section reads as a continuation of the PDP provenance ladder: .pdp-press-eyebrow ('Reader's notes · Correspondence' italic-serif 13px uppercase 0.18em at 0.42 alpha) + .pdp-press-rule hairline + .pdp-press-display h2 'From the press.' clamp(28,4vw,44) italic-serif (same defensive word-break:keep-all the existing .pdp-press-display + .about-display + .faq-display carry). Below the chrome, a new .pdp-reviews-list grid stacks the 3 quotes vertically, each entry centered with the .cult-fig label ('Fig. I', 'Fig. II', 'Fig. III') above the pullquote, then the .pullquote figure itself (vertical hairline-rule + italic-serif clamp(26,3.4,44) body at 0.96 alpha + opening curly-quote glyph + attribution row of em-dash + <cite> name + italic-serif role · place). The pullquote vocabulary is reused verbatim from the cult section so the register is sitewide-coherent rather than a per-surface re-invention. The cult-fig counter ::before (which would render '0.' before each fig-label outside the cult-entries counter scope) is suppressed via .pdp-reviews .cult-fig-label::before { display: none } — single override, no other vocabulary fork. Per-product review content: 18 quotes total (3 per product) authored in BFS voice — dry, slightly subversive, often turning a typical complaint into a paradoxical endorsement, each mentioning a specific physical detail of the product. void-book quotes describe keeping multiple copies that 'refuse to be written in by anyone but me', the silver-pencil celestial-map manuscript the publisher rejected, the lamp-test correction. abyssal-cardstock quotes describe sending an unprinted card as a 'gesture' (had merely run out of ink), the 30° blade-edge fidelity, the Risograph rejection vs guillotine consent. event-horizon-pad quotes describe drawing 'the same room for forty leaves' that outlasted the room, the tooth holding charcoal 'the way silence holds an argument', the morning-correspondence distinction. sticky-voids quotes describe marking unlendable books, the 'small ghost of attention' left after six months on oak, the customs-cleared postcard. savior-pen quotes describe the desert-flight-thesis survival, the silver-on-matte address inscription, the heavier-but-less-serious comparison vs Pilot Choose + Muji 0.38. executive-despair quotes describe the March-stop / October-resume undated logic, the foil-as-private-permission reading, the civil-but-final Hobonichi comparison. Attribution roles read editorially: Editor (Lisbon), Novelist (Trieste), Conservator (Istanbul), Studio principal (Lyon), Bookbinder (Vienna), Print correspondent (Reykjavík), Painter (Porto), Studio resident (Marfa), Architect (Antwerp, Geneva), Librarian (Galway), Joiner (Brittany), Correspondent (Seoul), Doctoral candidate (Tartu), Translator (Bergen), Stationer (Buenos Aires), Studio manager (Utrecht), Editor (Trieste). No stars. No avatars. No date stamps. No 'Verified Buyer' badges. JSON-LD aggregateRating is intentionally NOT emitted — quotes are internally authored placeholders; per task brief 'consider intent — if reviews are internally-authored placeholders, skip the JSON-LD until real reviews exist.' Net delta — 4 files, ~210 LOC: src/data/products.ts extended (Review type added, Product type gains reviews: Review[] required field, all 6 products backfilled in the same commit so no shape break, ~120 LOC), src/components/product-reviews.tsx new (60 LOC server component — no 'use client', so 0 bytes JS island delta), src/app/supplies/[id]/page.tsx (+5 LOC — 1 import + 1 mount between Dispatch & care and RelatedProducts), src/app/globals.css (+25 LOC — .pdp-reviews + .pdp-reviews-list + .pdp-reviews-entry + the cult-fig-label::before suppressor). Zero new primitives, zero new keyframes, zero new fonts, zero new tokens, zero new dependencies, zero new client islands — every motion uses the existing <Reveal> primitive (already prefers-reduced-motion-guarded) with 0.08s + 0.08s/entry stagger. A11y — <section aria-labelledby={id}>, each review wrapped in <figure><blockquote><cite>...</cite></figure> with semantic markup that screen-readers handle natively; aria-hidden on decorative glyphs (the opening ldquo and em-dash); reduced-motion vacuously satisfied because Reveal is the only motion path and it's already RM-guarded. Verified — bun run lint 0 errors + 7 pre-existing tooling warnings (unchanged set in .claude/improvement/scripts/*.mjs), bunx tsc --noEmit clean (Review type + Product reviews[] field propagate cleanly through 6 product entries), bun run build 42/42 static routes (unchanged — no new routes, the new component renders inside the existing 6 /supplies/[id] pages), SSR class grep PASS on all 6 PDPs (each renders 1 <section class=\"pdp-reviews\">, 3 <blockquote>, 3 <cite>, 1 'Reader's notes' eyebrow, 1 'From the press.' display h2), adjacent surface regression PASS — homepage 12 chapter-figure-frame (unchanged), 4 homepage <blockquote class=\"pullquote-body\"> (unchanged 4 testimonials), /about 10 about-section greps (unchanged signature), /journal index 16 href=/journal/<slug> anchors (unchanged 8 cards × 2 anchors each), journal RSS 8 items + sitemap 6 supplies entries both unchanged. 0 anti-patterns. perf-a11y — 0 bytes JS island delta (ProductReviews is a pure server component, no 'use client'), HTML delta ~3KB per PDP × 6 PDPs ≈ 18KB across the build (3 quotes × ~250 chars each + chrome markup per page), no LCP/CLS/INP risk on existing routes (the new section appears below the lede/colophon/dispatch on each PDP, never in the above-fold critical path), no new keyframes so reduced-motion is satisfied without explicit overrides. Self-rated rubric: T:2 M:1 L:2 I:1 A:3 D:3 = 12/18 (Solid). T:2 (italic-serif pullquote vocabulary, consistent register inherited from cult section, no new typography but the use of the existing pullquote system on a new surface increases its reach); M:1 (reuses Reveal stagger only, no new motion vocabulary); L:2 (centered single-column stack inside the existing 980px PDP content lane, matches .pdp-press / .pdp-dispatch register, the .cult-fig + pullquote composition reads as a deliberate editorial spread); I:1 (passive content, no new interactions); A:3 (proper blockquote/cite/figure markup, aria-labelledby on the section, aria-hidden on decorative glyphs, no motion-only signal, color contrast inherited from the well-tested cult vocabulary at 0.96 alpha on matte ground); D:3 (editorial pull-quotes on a PDP — naming individuals 'Tomás R. · Editor · Lisbon' and crediting them with anecdotes about silver-pencil celestial-map manuscripts and customs-cleared postcards — vs the SaaS-default star-rating widget is one of the highest-distinctiveness moves on a PDP; the BFS voice is the differentiator and the register coherence is what makes it work rather than read as random). Risk band: medium per task brief — extends Product type shape (all 6 products must be updated atomically so the shape never breaks mid-build), adds 1 new server component + 1 CSS block + 1 PDP mount. Direct-commit to main per risk-rules.md medium-band mapping for pure-content / data-extension ships that touch a single surface with no architectural change. Task-driven (Notion page 35faf8d3-d3e2-8177-9105-c426f3028bac 'Add customer reviews / press quotations on PDPs — editorial register, NOT star-rating stack'). Also performed Phase 0 Notion housekeeping — found a stuck 'In progress' task (35faf8d3-d3e2-8188-a138-ddf72125fe36 'PDP editorial sections') whose actual ship landed earlier as commit a635f7c but the Notion record was never flipped Done; updated the task Status: In progress → Done with Commit: a635f7c, Completed: 2026-05-14, Surface: [catalogue, system] to clean up the orphan. Follow-ups: pdp-review-real-quotes-when-available (low — when real customer correspondence accumulates, swap in 2-3 real quotes per product and emit Schema.org aggregateRating + Review JSON-LD; today's 18 quotes are placeholders), pdp-review-randomize-displayed-quote-per-visit (low — task brief mentioned optional client-side randomization; skip for now since 3 quotes per page is below the threshold where rotation reads as desirable), pdp-review-real-customer-correspondence-collection-flow (low — set up a dispatch-included card or follow-up email that invites a quote; the press has no review-collection mechanism today)."

