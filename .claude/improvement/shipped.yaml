    summary: "Adds scroll-driven settling to the closing oversized BFS wordmark in src/components/site-footer.tsx:142 — the giant outline-stroke text that reads as the editorial closing line of every homepage scroll. Pure CSS — uses native animation-timeline: view() so the wordmark drives its OWN viewport progress timeline; as it enters and traverses 90% of the cover region, letter-spacing tightens from -0.04em → -0.08em (the resting base value) AND -webkit-text-stroke-width thins from 2px → 1px (also the resting base value). Reads as type 'settling onto the page-foot' — looser/heavier on first appearance, then settling into its base register as the reader reaches the bottom. Previously inert: a 50vw outline wordmark sitting completely static as the closing visual of the entire site. Net delta — 1 file modified, +25 LOC: one @supports (animation-timeline: view()) block wrapping a @media (prefers-reduced-motion: no-preference) and (min-width: 900px) block, containing the .outro-wordmark { animation: outro-wordmark-settle linear both; animation-timeline: view(); animation-range: entry 0%25 cover 90%25; } rule plus the @keyframes outro-wordmark-settle definition (from { letter-spacing: -0.04em; -webkit-text-stroke-width: 2px } → to { letter-spacing: -0.08em; -webkit-text-stroke-width: 1px }). Inserted at globals.css:3139-3163 immediately after the existing .outro-wordmark base rule. Gating discipline — triple gate matching the chapter-numeral-drift ship (commit 1732445): (1) @supports (animation-timeline: view()) blocks non-supporting browsers — fall through to the static base rule, zero regression; (2) prefers-reduced-motion: no-preference excludes the entire animation block for users who prefer reduced motion; (3) min-width: 900px aligns with where the wordmark is visually dominant. Animate letter-spacing + stroke-width ONLY — stroke COLOR stays under the base rule at rgba(255,255,255,0.1) so contrast doesn't shift; container overflow: hidden + white-space: nowrap + max-height: 35vw clip horizontal compression so adjacent siblings can never reflow. Why view() — the wordmark element is its own driver; same pattern as .chapter-numeral above proven yesterday. Why not animate color/opacity — would break the chrome's existing register (which depends on the constant low-alpha outline); animating geometry only preserves the brand while adding motion-design weight. Verified — bun run lint 0 errors + 7 pre-existing tooling warnings (unchanged set in .claude/improvement/scripts/*.mjs), bunx tsc --noEmit clean, bun run build 48/48 static routes (unchanged), 0 anti-patterns. perf-a11y — 0 bytes JS delta (CSS-only), no LCP risk (wordmark at page-foot, off the above-fold critical path), no CLS risk (animated properties only affect glyph-internal painted geometry; container is overflow: hidden + max-height: 35vw so horizontal compression cannot reflow neighbors), no INP risk (compositor-driven, off main thread). Reduced-motion respected. Non-supporting browser path: static base rule (1px stroke, -0.08em letter-spacing). Mobile (≤899px): static base rule. Adjacent-surface regression PASS — keyframe outro-wordmark-settle is unique across the codebase (verified against grain/load/pulse/scrollLine/marquee/chapter-numeral-drift/bumpcount/cart-line-in/folio-rise/folio-typeset/checkoutSealEnter/cookie-banner-rise — 12 other named keyframes, all distinct); .nf-wordmark on /not-found uses a separate class (the comment at globals.css:4402 'same outline-stroke treatment as outro-wordmark' refers to visual register only, not selector sharing) — its rules are untouched and the new animation cannot leak there; the existing chapter-numeral @supports block at globals.css:1368-1380 animates a transform-only keyframe and has no property overlap with the new letter-spacing/stroke-width keyframe; the view-transition @supports block at globals.css:5639+ targets a different feature query (view-transition-name) so no cascade clash. Element is aria-hidden + pointer-events:none + user-select:none — no keyboard regression possible. Self-rated rubric: T:2 M:3 L:1 I:1 A:2 D:3 = 12/18 (Distinctive band). T:2 — extends the scroll-bound-typography vocabulary the site already owns (chapter-numeral drift, hero-period scrollfade, errata layer, chapter-rail scrollbound fill). M:3 — closing-page distinctiveness; static-outline-wordmark-becomes-scroll-bound-settle is a peak-Awwwards moment that was sitting unused. L:1 — single element, no surface multiplier. I:1 — no new interactive affordance. A:2 — decorative aria-hidden glyph, geometry-only animation, triple-gated. D:3 — scroll-driven settling of letter-spacing + stroke-width via native CSS view() timeline reads as designed motion rather than canned reveal; uses the closing-line of the page as a typography moment. Risk band: low — pure additive CSS, gated three ways, no primitive change, no JSX touched, no shared component, no SEO surface, 1 file 25 LOC. Direct-commit to main per risk-rules.md low-band default. Picker note — regular-discovery pick this run (not task-driven). The two open To-do Notion tasks (image-gen 35faf8d3-d3e2-8168-9026-c7ce8590e62b and motion-vocabulary 35faf8d3-d3e2-816e-9304-f18860d09138) remain deferred for the third consecutive run; both still flagged as split-candidates by prior runs' documented follow-ups. The motion-vocabulary task explicitly lists scroll-driven moves on the closing chrome as candidate slices — this ship lands one of those slices as a focused single move without forcing the full split, mirroring yesterday's chapter-numeral-drift slice. Discovery sources — chrome+cart auditor explicitly called out 'outro-wordmark is a giant text-stroke BFS sitting completely static — peak Awwwards moment, zero motion' as finding #6 (high D, low effort); reference-scout's #2 finding (eyebrow hairline draw-in via view()) used the same gate pattern as proof point. Outro surface was COLD for 6+ ships per historian's surface-freshness analysis (last 6 ships: catalogue/chrome/seo/seo/catalogue/system) — this run uses the cold-surface tiebreak to land an outro move. Follow-ups uncovered: outro-wordmark-settle-token-promotion (low — the -0.04em/2px start values are one-off literals; if another scroll-bound settling instance lands, promote to --wordmark-settle-start vars); outro-wordmark-stroke-color-scroll-bind (low — auditor suggested binding stroke-color as well as width to scroll progress, but doing so would break the constant low-alpha outline register; defer); folio-numeral-re-typeset-on-chapter-cross (medium — chrome auditor finding #1, would re-fire SplitText keyed on activeId in src/components/running-folio.tsx; M-effort, separate ship); cart-line-hover-affordance-hairline-draw (medium — chrome auditor finding #2, single CSS block on .cart-line::before scaleY 0→1, S-effort, separate ship); chapter-rail-label-italic-serif-personality (medium — chrome auditor finding #3, replace stock fade-and-translate with clip-path text-reveal or scribble-underline on chapter-rail-label, M-effort); cart-drawer-scrim-fade-out-delay (low — chrome auditor finding #4, single CSS line transition-delay on scrim opacity for staged exit choreography); outro-link-hairline-draw-underline (low — chrome auditor finding #5, mirror .cart-line-remove::after pattern on .outro-links a); journal-post-tag-affordance (high — journal auditor finding #1, turn tags into <Link href='/journal?tag={slug}'> with hover affordance + index-page tag filter, S-effort distinctive); journal-index-scroll-bound-piece-folio (medium — journal auditor finding #2, sticky 'Piece N of XI' folio rail + view-timeline numeral parallax on .journal-entry-numeral, M-effort); journal-post-reading-progress-and-legal-about-dropcap-reach (medium — journal auditor finding #3, 2px scroll-progress bar + drop-cap reach to .about-prose and .legal-prose); article-jsonld-broader-shape (medium — journal auditor finding #4, add inLanguage/articleSection/wordCount/isPartOf to ArticleJsonLd in src/app/journal/[slug]/page.tsx:75-92); journal-breadcrumb-primitive-extract (low — journal auditor finding #5, extract JournalBreadcrumb across journal-post-frame/legal-page-frame/about, add hairline draw between crumbs); journal-related-posts-tag-overlap-ranking (low — journal auditor finding #6, rank by Jaccard tag-overlap in src/lib/journal.ts:65, bump to 3); legal-about-display-asymmetric-outline-stroke (medium — journal auditor finding #7, apply two-word outline-stroke vocabulary to legal/about display); folio-char-by-char-retypeset (medium — scout #4, M-effort, separate ship); eyebrow-hairline-draw-in-view-timeline (low — scout #2, S-effort, draws .chapter-eyebrow-mark and .section-tag::before via view() timeline, could pair with running-drop-cap scout #3); running-drop-cap-every-nth-paragraph (low — scout #3, S-effort, extends .journal-prose drop-cap to every 5n+1 paragraph); motion-vocabulary-split-into-3-subtasks (medium — Notion task 35faf8d3-d3e2-816e-9304-f18860d09138 has been deferred 3 runs running; next run should split it into [1/3] live-kerning-on-hover [2/3] character-by-character-drift [3/3] view-transitions-page-turn rather than defer a 4th time); image-gen-split-by-surface (medium — Notion task 35faf8d3-d3e2-8168-9026-c7ce8590e62b deferred 3 runs running; next run should split into [1/3] homepage [2/3] journal [3/3] PDPs)."

  - id: hero-title-scroll-driven-char-drift
    title: "Hero title — scroll-driven per-character drift (animation-timeline: view()) on the Dark Matter. h1 via SplitText .split-char descendants"
    commit: 8708f51
    date: 2026-05-14
    surface: hero
    tags: [hero, system, h1, splittext, split-char, motion, scroll-driven, animation-timeline, view-timeline, view-timeline-name, named-timeline, standalone-rotate, nth-child, per-character, breathing-typography, css-only, no-js, no-new-primitives, no-new-deps, no-new-tokens, no-new-fonts, reduced-motion, supports-fallback, awwwards-current, task-driven, split-subtask, motion-vocabulary-1-of-3]
    summary: "Subtask [1/3] of the motion-vocabulary parent (Notion 35faf8d3-d3e2-816e-9304-f18860d09138 'Add the next layer of motion vocabulary…' parent split this run in Phase 0 — parent flipped Status: To do → Split with 3 single-motion subtask URLs in Subtasks column). Subtask [1/3] (360af8d3-d3e2-8118-8122-d43bac403bd4) claimed → Done with Commit: pending, Surface: [hero, system]. [2/3] (360af8d3-d3e2-81d9-be2b-e36fc60aad23 hover-bound letter-spacing) and [3/3] (360af8d3-d3e2-81ab-bdbb-fe56c3cd37ed magnetic reveal extension) remain Status: To do queued for future runs. Adds scroll-driven per-character drift to the hero h1 (src/app/page.tsx:108 'Dark Matter.') — each .split-char descendant rotates ±2° as the title moves through its entry 0% → exit 100% view-timeline range, with nth-child(odd|even) alternation so adjacent chars rotate in opposite directions and the title reads as breathing typography rather than uniform tilt. Pure CSS — named view-timeline declared on .hero-title (view-timeline-name: --hero-title-tl) so all .split-char descendants reference the same parent timeline via animation-timeline: --hero-title-tl, giving a coherent through-line of progress across all glyphs rather than each glyph's own viewport timeline (which would barely vary across siblings on the same line). Per-char asymmetric variation comes from .hero-title .split-char:nth-child(even) swapping the keyframe name from hero-char-drift-a to hero-char-drift-b; the two keyframes are inverses (one peaks +2°/−2°/+2°, the other −2°/+2°/−2°) producing a wave pattern across the title. **Standalone `rotate` property** (not transform) chosen specifically to compose cleanly with SplitText's transform-based entrance: standalone rotate applies before the matrix in transform per CSS Transforms Level 2, so the entrance transform: translateY(110%) rotate(8deg) → translateY(0) rotate(0) continues to drive the reveal motion while our rotate: 2deg from the keyframe layers on top without conflict. Net delta — 1 file modified, +34 LOC: one @supports (animation-timeline: view()) block wrapping a @media (prefers-reduced-motion: no-preference) and (min-width: 900px) block, containing the view-timeline-name declaration on .hero-title, the animation/animation-timeline/animation-range rules on .hero-title .split-char, the nth-child(even) keyframe swap, plus the two @keyframes hero-char-drift-a and hero-char-drift-b definitions. Inserted at globals.css:842-877 immediately after .hero-period .split-char (so it lives with the related hero-glyph rules in source order). Gating discipline — triple gate identical to chapter-numeral-drift (1732445) and outro-wordmark-settle (6a5a8e9): (1) @supports (animation-timeline: view()) blocks Chrome <115 / Edge <115 / Safari <18 — fall through to existing entrance reveal then static, zero regression; (2) prefers-reduced-motion: no-preference excludes the entire animation block; (3) min-width: 900px aligns with the existing chapter-numeral/outro-wordmark cutoffs — mobile hero is sized smaller and ±2° rotation on 30-40px small-screen glyphs would feel jittery rather than breathing. Animation is **rotate-only** — no translate, no scale, no opacity, no color. ±2° rotation around char center stays inside the .split-word's overflow: hidden bounds at the hero title's intrinsic line-height (inline-block bounding box absorbs the small corner displacement without visible clipping). No CLS risk by spec — rotation does not affect layout. Verified — bun run lint 0 errors + 7 pre-existing tooling warnings (unchanged set in .claude/improvement/scripts/*.mjs), bunx tsc --noEmit clean, bun run build 48/48 static routes (unchanged), 0 anti-patterns. perf-a11y — 0 bytes JS delta (CSS-only), no LCP risk (rotate is a composited transform-class property, off main thread), no CLS risk (rotation does not trigger layout), no INP risk (scroll-driven via native compositor, no JS scroll listeners). Contrast unchanged (rotation does not affect color or opacity). Reduced-motion respected — entire @supports block excluded by the nested @media (prefers-reduced-motion: no-preference). Non-supporting browser path: entrance reveal + static at rest, zero regression. Mobile (≤899px) path: entrance reveal + static at rest, zero regression. Adjacent-surface regression PASS — SSR class-grep on / (port 3010 since :3000 is taken by another local project): .split-char 224 (unchanged — extension is rule-only, doesn't alter DOM), .hero-title 4 refs (unchanged), .hero-word-1/-2 8 refs (unchanged), .chapter-numeral 12 refs (unchanged — adjacent view-timeline ship intact), .outro-wordmark 2 refs (unchanged — yesterday's view-timeline ship intact), .split-word 42 refs (unchanged). Keyframe uniqueness verified — hero-char-drift-a and hero-char-drift-b collide with 0 of the 13 prior @keyframes (grain, load, pulse, scrollLine, marquee, chapter-numeral-drift, bumpcount, outro-wordmark-settle, cart-line-in, folio-rise, folio-typeset, checkoutSealEnter, cookie-banner-rise — all distinct). New rule is scoped to .hero-title .split-char only — does NOT affect .hero-period .split-char (rule at globals.css:839), .nf-period .split-char, .pdp-period .split-char, or any other SplitText consumer. Self-rated rubric: T:2 M:3 L:1 I:1 A:2 D:3 = 12/18 (Distinctive band). T:2 — extends the scroll-bound-typography vocabulary BFS owns at chapter spreads and page-foot to the FIRST display element a visitor sees, completing the through-line hero → chapter spreads → page-foot. M:3 — applying view-timeline to per-character variation (not just element-wide) is current cutting-edge CSS; most Next.js sites hand-roll IntersectionObserver + Framer Motion for this and the result wouldn't be as resilient under reduced-motion. L:1 — single element, no surface multiplier. I:1 — no new interactive affordance. A:2 — decorative motion on aria-label='Dark Matter.' h1, rotation-only (no contrast change), triple-gated fallback. D:3 — per-character scroll-driven drift via native CSS view(