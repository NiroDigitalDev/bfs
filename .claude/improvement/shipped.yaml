ar(--dur-2) ease'. Inside the gate, we declare the full shorthand including both properties so the existing color fade isn't lost: 'transition: color var(--dur-2) ease, letter-spacing 240ms cubic-bezier(0.32, 0.72, 0, 1)'. Layout-shift analysis: 0.02em delta on a 13px font (.btn-primary) is 0.26px/char × ~19-char 'Enter the catalogue' label = ~5px button growth; inline-flex with internal padding 16px 24px, centered hero / right-aligned footer placement — no neighbor shift in any mount. 0.02em delta on an 11px font (.chapter-eyebrow) is 0.22px/char × ~22-char 'Chapter 01 / Subtitle' content = ~5px growth; inline-flex inside the chapter header column wider than the eyebrow content — no neighbor shift. Net delta — 1 file modified, +20 LOC: one @media (prefers-reduced-motion: no-preference) block at globals.css:~1446 (inserted between the .chapter-eyebrow-sub closing brace and the .chapter-title opening brace) containing 4 rules (.btn-primary transition extension + .btn-primary:hover letter-spacing + .chapter-eyebrow transition + .chapter:hover .chapter-eyebrow letter-spacing) plus a 3-line comment header explaining the RM-gate strategy. Architecture — pure CSS hover transition, no JS, no client boundary, no JSX touch, no shared primitive modified, no new tokens (the 0.02em deltas don't justify token promotion — they're spec-named magnitudes per the brief), no new keyframes (the brief explicitly avoids keyframes — this is a transition not an animation). 240ms / 0.18em / 0.32em are spec-named values from the brief, not magic numbers. Verified — bun run lint 0 errors + 7 pre-existing tooling warnings (unchanged set in .claude/improvement/scripts/*.mjs), bunx tsc --noEmit clean, bun run build 48/48 static routes (unchanged), 0 anti-patterns. regression-spotter — N/A by definition. CSS-only diff (1 file, +20 LOC, 0 JSX/data changes verified via git diff --name-only). SSR HTML is byte-identical to the prior ship — class signatures cannot change without JSX touches, and hover