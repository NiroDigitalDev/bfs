  - id: cart-autoopen-drawer-and-live-region
    title: "AddToCart auto-opens cart drawer + polite live-region announces the added item"
    commit: e1f0743
    date: 2026-05-14
    surface: cart
    tags: [cart, system, catalogue, add-to-cart, drawer-autoopen, aria-live, polite-region, role-status, aria-atomic, sr-only, hydration-safe, focus-trap, escape-returns-focus, custom-event-add, custom-event-open, useSyncExternalStore, idempotent-setopen, return-focus-ref, react-fragment-sibling, no-new-deps, no-new-css, no-new-keyframes, behavior-only-ship, task-driven]
    summary: "Closes the long-standing AddToCart UX gap — chapter-CTA and PDPAddToCart used to commit silently (a 1800ms `data-added` flash on the button + a bumped off-screen CartCount), leaving users unsure whether anything had landed in the cart. This ship hard-wires the open: both handlers now call `cart.open()` immediately after `cart.add(...)`, dispatching the existing OPEN_EVT that CartDrawer already listens to. The drawer captures the active AddToCart button as returnFocusRef before flipping open, the 80ms focus-shift-to-closeBtn carries over, Escape closes + returns focus to the trigger, and Tab cycles within the focus-trap — all from the prior drawer plumbing, untouched. Idempotent setOpen(true) means re-adding while the drawer is already open is a no-op for animation (the brief explicitly flagged this acceptance criterion). Second concern bundled into the same ship per the task brief: a polite live-region announcement of the added item title. CartDrawer renders a new always-on `<span class=\"sr-only\" role=\"status\" aria-live=\"polite\" aria-atomic=\"true\">` as a Fragment-sibling of cart-drawer-root (NOT a child — the root carries aria-hidden={!open} so a nested live region would be suppressed when the drawer is closed, defeating the announcement that fires while the drawer is mid-opening). A new useEffect listener for cart.ADD_EVT reads the productTitle off the CustomEvent detail, sets state to \"Added <title> to cart.\", and schedules a 4000ms setTimeout to clear so re-adds re-announce. Cleanup clears both listeners and pending timer. Pattern matches the existing precedent at checkout-form.tsx:121 — empty-string-initial sr-only polite region, not conditional render (conditional render risks missing the first announcement because AT only watches existing live regions for mutations). CSS: zero new lines, reuses `.sr-only` at globals.css:97. Verified — bun run lint 0 errors + 7 pre-existing tooling warnings, bunx tsc --noEmit clean, bun run build 27/27 static routes (same count, drawer SSRs with data-open=\"false\" on every route), regression-spotter PASS across 13/13 prerendered shell-bearing pages (/, /supplies/{6}, /journal + post, /checkout, /privacy, /terms, /cookies — empty `<span class=\"sr-only\" role=\"status\" aria-live=\"polite\" aria-atomic=\"true\"></span>` present as direct sibling immediately before cart-drawer-root on every page, no announce-text bleed into SSR), perf-a11y PASS with <1KB gzipped client delta + no LCP/CLS/INP risk + .sr-only is not focusable so tab order is intact + reduced-motion N/A because zero new keyframes, diff-reviewer PASS-WITH-NITS (4000ms not tokenized, pre-existing 1800ms in cart-island also not tokenized, cosmetic Fragment-wrapper indentation — all three logged as follow-ups), 0 anti-patterns. Net diff: 2 files, +28/-2 LOC (zero new files, zero new dependencies, zero new CSS lines, zero new keyframes). Self-rated rubric: T:0 M:1 L:1 I:0 A:3 D:0 = 5/18 (behavior-only — a11y is the entire point, not a visual moment). Task-driven (Notion page 35faf8d3-d3e2-810a-8c09-c05c76894f56 'When AddToCart commits an item, auto-open the cart drawer'). Risk band: medium. Follow-ups: cart-announce-ttl-token (medium, sweep 4000ms + pre-existing 1800ms into named consts), cart-drawer-fragment-indent (low, cosmetic re-indent on next file touch), cart-add-double-announce (low, verify CartCount aria-live + new announce don't double-speak in a real screen-reader session)."

