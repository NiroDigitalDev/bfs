    summary: "Adds 3 new BFS-voice journal posts (the-grammar-of-blackest-black, paper-that-resists-journalism, on-the-seal-of-a-dispatch) under src/data/journal/ — subtask [1/3] of the parent task 'Write 10 BFS-voice journal posts' which was split in Phase 0 of this run (parent body brief tripped the splitting heuristic: > 6 new files + > 1 new public-facing route + L effort with ~3000-5000 LOC). Subtasks [2/3] (4 posts on type/marginalia/numerals/folio) and [3/3] (3 posts on edition physics/SaaS manifesto/noindex) created in Notion with Status: To do, parent flipped to Status: Split. Each new post is a self-contained .tsx file exporting a default JournalPost — function Body() returns h2/h3/p/blockquote/em markup in the same editorial register as the seed (vol-iii-no-1-the-typography-of-black), with proper typographic curly quotes (’ and “”) throughout to satisfy react/no-unescaped-entities and match BFS's editorial baseline. Voice review — italic-serif <em> inline emphasis (Vantablack figure '99.965%', Pierre Soulages's term 'Outrenoir', the wax 'noir d'imprimerie', density figure '240gsm', the hairline '0.5pt'), no AI-tells ('In conclusion', 'It's worth noting', bullet-list-only structure), short paragraphs in BFS's dry editorial register with first-person plural 'we', press-as-narrator framing ('we mention this whenever we cut a plate', 'we have shipped editions with no wordmark on the dispatch label'), and one blockquote per post serving as the typographic pull-quote rhythm the journal-prose drop-cap + hanging-punctuation ship landed earlier today. Post 1 (the-grammar-of-blackest-black, publishedAt 2026-04-12, tags pigment/press-notes/edition III) covers Outrenoir, Mars Black, the Vantablack carbon-nanotube chemistry, K100 vs the rich-black 30% cyan plate. Post 2 (paper-that-resists-journalism, 2026-04-26, paper/press-notes/edition III) covers newsprint as confession, 240gsm/180gsm density specs, uncoated vs coated stocks, why BFS does not specify whiteness, the deckle as romance. Post 3 (on-the-seal-of-a-dispatch, 2026-05-03, dispatch/ritual/edition III) covers the 0.5pt hairline rule that precedes the wax, the noir-d'imprimerie wax colour, the quartered crest with two blank quarters, the included paper knife. All three posts have publishedAt < seed (2026-05-13), so the journal index sorts seed-first/newest-first and the SSR DOM order is voliiiNo1 → onTheSealOfADispatch → paperThatResistsJournalism → theGrammarOfBlackestBlack. src/data/journal/index.ts updated — imports the 3 new named exports + adds to journalPosts array. Zero changes to: src/lib/journal.ts (existing getAllPosts/getPostBySlug/getRelatedPosts auto-pick-up new posts), src/app/journal/page.tsx (auto-renders new cards via getAllPosts), src/app/journal/[slug]/page.tsx (auto-generateStaticParams + per-post metadata + Article JSON-LD), src/app/journal/rss.xml/route.ts (auto-includes new items), src/app/sitemap.ts (auto-includes new URLs), src/app/opengraph-image.tsx (per-route OG auto-generates from post fields). Net delta — 4 files, +263/-1 LOC: 3 new files (the-grammar-of-blackest-black.tsx 81 LOC, paper-that-resists-journalism.tsx 76 LOC, on-the-seal-of-a-dispatch.tsx 78 LOC) + 1 modified (src/data/journal/index.ts: +6/-1 to add 3 imports + 3 array entries). Verified — bun run lint 0 errors + 7 pre-existing tooling warnings in .claude/improvement/scripts/*.mjs (initial 11 react/no-unescaped-entities errors fixed inline by switching to typographic curly quotes ’ ” which also matches BFS's editorial register — straight quotes were a placeholder, curly are the correct register), bunx tsc --noEmit clean, bun run build 34/34 static routes (was 28; +6 = 3 new posts × post page + opengraph-image route). SSR class grep PASS on all 3 new post pages: each has <article>=1, <h1>=1, <h2>=1, <blockquote>=1, Article JSON-LD=1, canonical link=1. Journal index SSR PASS — 4 href=/journal/<slug> cards present (vol-iii, on-the-seal, paper-that, the-grammar), h1=1, Blog JSON-LD=1. RSS feed PASS — 4 <item> entries with correct titles. sitemap.xml includes 4 post URLs + /journal index. Adjacent surface regression PASS — homepage 12 chapter-figure-frame (unchanged), /about 4 about-section blocks (3 plain + 1 coda variant, unchanged), /supplies/void-book 1 pdp-press-display (unchanged). 0 anti-patterns. perf-a11y — 0 bytes JS delta (pure server-component data + prose JSX, no client islands added), gzipped HTML delta ~6KB total across 3 new SSR'd pages (each ~2KB compressed) + ~6KB across 3 new RSC payloads, no LCP/CLS/INP risk on existing routes (only the journal index gets 3 new cards in the rendered list, layout unchanged), reduced-motion vacuously satisfied (zero new keyframes/transitions/animations). Self-rated rubric: T:1 M:0 L:1 I:0 A:2 D:2 = 6/18 (Solid). T:1 because the posts inherit the existing journal-prose typographic register that drop-cap + hanging-punctuation + small-caps lede shipped to earlier today — no new type system, but each post benefits from the per-post drop-cap fire; M:0 (intentionally static — long-form prose reads, doesn't animate); L:1 (each post is the existing JournalPostFrame composition; no new layout primitive); I:0 (pure read-only content); A:2 (semantic h2/h3/p/blockquote/em markup, Article JSON-LD per post, canonical links, descriptive excerpts, no decorative-only structure, screen-readable text content with proper typographic curly quotes that voice synth handles cleanly); D:2 (the editorial voice — Outrenoir/K100/Mars Black, the 240gsm density vs newsprint-as-confession framing, the 0.5pt hairline that precedes the wax — is genuinely distinctive against the typical Next.js 'blog post' that reads as SaaS marketing prose; the per-post register is the move, even though the typographic primitives are inherited). Risk band: medium per parent task brief (~900 LOC of new prose JSX, 3 new SSG routes, but each post is self-contained and no shared primitive touched). Direct-commit to main per risk-rules.md medium-band mapping (pure content + data, not architectural). Task-driven (Notion subtask page 360af8d3-d3e2-81c5-b589-c8125c18504e '[1/3] Journal — 3 BFS-voice posts on pigment, paper, and the seal', parent 35faf8d3-d3e2-81e5-8b57-f446e4a5a226). Follow-ups: journal-subtask-2-of-3 (medium, queued — 4 posts on type/marginalia/numerals/folio), journal-subtask-3-of-3 (medium, queued — 3 posts on edition physics/SaaS manifesto/noindex), journal-post-curly-quote-codemod (low — consider a build-time codemod or eslint-plugin-typographic to enforce ’/“/” across all .tsx prose surfaces so future posts don't first-pass-fail react/no-unescaped-entities), journal-post-related-posts-component (low — task brief mentions optional <RelatedJournalPosts> cross-referencing; getRelatedPosts is already wired in src/lib/journal.ts but no component renders it under the post body yet)."
