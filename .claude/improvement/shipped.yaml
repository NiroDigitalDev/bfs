graph + Magnetic 'Read the journal →' CTA at href=/journal as the page's exit beat); (5) legal-page-foot footer with the same magnetic 'Return to the volume' return-link + Edition III · MMXXVI signoff used by /privacy, /terms, /cookies; (6) AboutPage + Organization JSON-LD embedded via `<script type=\"application/ld+json\">` with the AboutPage's mainEntity field pointing to the Organization (name, url, description, email, foundingDate '2024', slogan 'Stationery in the absence of light'). New CSS block at globals.css:7206-7359 (+154 LOC) — .about-display (clamp(56,11vw,168) italic-serif, word-break:keep-all + overflow-wrap:break-word + hyphens:manual to prevent the mid-word break failure mode fixed earlier this volume), .about-lede (max-width 56ch), .about-prose (max-width 72ch, slightly wider than .legal-prose's 68ch to support the section rhythm), .about-section (border-top + padding-top vertical rhythm; first-of-type strips the border), .about-section-coda (extra bottom padding), .about-section h2 (clamp(28,4vw,44) italic-serif override of the .journal-prose h2 baseline for editorial weight on the about page), .about-studio-dl (max-width 64ch narrows the colophon dl into the prose column), .about-cta + .about-cta-arrow + .about-cta-row (italic-serif clamp 17px destination cue with hairline border-radius:999px pill, hover lifts color + border alpha + arrow translateX(6px); `@media (prefers-reduced-motion: reduce)` zeroes both the transition and the arrow translate). All motion respects the existing reduced-motion contract — SplitText/Reveal/Magnetic primitives already guard, and the CTA hover transition explicitly opts out under RM. sitemap.ts (+6 LOC) maps /about to priority 0.5 + changefreq monthly + lastModified=now — sits between /journal (0.7) and /privacy|/terms|/cookies (0.3) as a destination route that's not a primary entrypoint but is more permanent than statutory pages. site-footer.tsx (+3 LOC) adds an `<Link href=\"/about\">About</Link>` between the Journal link and the Studio mailto in the main outro-links nav, so /about is reachable from every non-checkout route via the global colophon. Top nav intentionally NOT touched — adding /about as a 6th nav item would crowd the editorial-tight 5-item layout (Catalogue/Position/Field Notes/On Record/Journal + cart pill); about is a destination you arrive at, not one you pass through, and the footer surface is the right register for that. Verified — bun run lint 0 errors + 7 pre-existing tooling warnings in .claude/improvement/scripts/*.mjs, bunx tsc --noEmit clean, bun run build 28/28 static routes (was 27, /about added as static prerendered ○), regression check (SSR class grep) — /about renders 1 `<h1>` + 4 `<h2>` (about-principles/about-studio/about-commissions/about-press) + 4 `<section class=\"about-section\">` blocks + 2 `<a class=\"about-cta\">` CTAs + 1 `class=\"about-studio-dl\"` + 1 AboutPage JSON-LD script + 1 Organization JSON-LD (nested in mainEntity) + canonical=/about + robots=index,follow + og:title 'About · Blacks For Sale'; sitemap.xml includes `<loc>http://localhost:3000/about</loc>`; / and /journal both expose `href=\"/about\">About` from the global colophon; /checkout still SSRs outro=0 (footer correctly excluded), homepage outro=1, adjacent surfaces (/, /journal, /privacy, /supplies/void-book) all show outro=1 and adjacent-route SSR signatures unchanged; 0 anti-patterns. Net diff: 4 files, +416/0 LOC (1 new file at src/app/about/page.tsx 254 LOC; 3 modified: globals.css +154, sitemap.ts +6, site-footer.tsx +3). Self-rated rubric: T:2 M:1 L:3 I:2 A:3 D:2 = 13/18 (Distinctive). T:2 because the page introduces a new clamp scale between hero and legal but extends rather than re-defines the typographic system; M:1 because motion is minimal (SplitText on h1, Reveal on the dl + CTAs, Magnetic on the two CTAs) — all existing primitives, no new keyframes; L:3 because asymmetric editorial sections with hairline rhythm, h2 italic display, colophon dl, and a CTA p