    summary: Three semantic `<del>/<ins>` errata pairs added on the homepage — catalogue section-lede ("Stocked when stocked." → "Bound when bound."), codex section-lede ("None new." → "None borrowed."), manifesto credo ("brand" → "press"). New `.errata*` CSS block (~60 lines, globals.css:6685+) styles strikethrough at 0.55 alpha with hairline color, inserted text in italic-serif at 0.95 alpha, and a decorative "§ corr." superscript marginalia mark (aria-hidden, hidden < 720px). `<del>` and `<ins>` are NOT aria-hidden — screen readers announce "deleted: X; inserted: Y" via native semantics. Hover: cor dims to 0.32, mark brightens to 0.78 via `--dur-1`/`--ease-out-quart` tokens. `prefers-reduced-motion` zeros transitions. Establishes a sitewide BFS-press grammar future ships can extend (journal-prose, chapter eyebrows). Pure CSS — zero client JS delta. Rubric T3 M1 L2 I2 A2 D3 = 13 / Distinctive.

  - id: press-clipping-register
    title: Press section reframed as hairline-divided clipping-book register — italic-serif numerals + oldstyle Vol/№/p marginalia
    commit: c345501
    date: 2026-05-13
    surface: press
    tags: [press, clipping-book, citation, ordered-list, italic-serif, roman-numeral, oldstyle-nums, hairline-divider, focus-within, stroke-dashoffset, underline-draw, micro-interaction, prefers-reduced-motion, template-residue-removed, decorative-aria-hidden, no-js, ssr-only]
    summary: Retires the homepage's last template-residue surface — a center-flexed row of five uppercase Inter-900 "logo cloud" publication names with a translateY hover lift — and replaces it with an ordered list of five hairline-divided clippings in BFS's editorial register. Each clipping is a three-row grid (italic-serif Roman numeral I–V at 0.55 alpha → italic-serif publication name at 0.78 alpha → italic-serif "Vol. XI · № 3 · p. 42" marginalia at 0.32 alpha with oldstyle-nums). Vertical hairlines between cells at ≥ 720px (collapsing to a single horizontal hairline per row on mobile); whole register sealed top + bottom with `var(--color-line)` so it reads as a clipping-sheet rather than a centered row of pills. New `.press-register` + `.press-clipping*` block (~112 lines, globals.css:2216–2327) replaces the old `.press-grid` + `.press-item` rules entirely. Hover/`:focus-within` lifts name → 1.0, numeral → 0.78, meta → 0.55, adjacent-cell border to `--color-line-2`, and draws an inset hairline `::after` from left → right via `transform: scaleX(0→1)` over `--dur-2 var(--ease-out-quart)`. `:focus-within` mirror is dormant today (no focusable children) but forward-compatible if names later become real citations. Numeral + meta are `aria-hidden` so AT users hear an ordered list of five publication names with no decorative bleed; name's 0.78 alpha over `#050505` ≈ 15.8 : 1 (comfortable AA). `prefers-reduced-motion: reduce` zeroes every transition including the underline-draw transform. Pure CSS + JSX swap — zero client JS delta. Reuses existing tokens only (`--color-line`, `--color-line-2`, `--font-serif`, `--dur-2`, `--ease-out-quart`). Rubric T3 M1 L3 I2 A3 D3 = 15 / Awwwards-grade-band. Picked over manifesto-item-as-sans-card (tied D=3) on lower effort and on coldest-tell prioritization — the press strip was the loudest "this is still a Next.js template" residue on the homepage's cold half.

  - id: nav-cart-overlap-fix
    title: Nav cart pill — fix right-edge overlap from <Magnetic> wrapping
    commit: 3b14a27
    date: 2026-05-13
    surface: nav
    tags: [nav, cart, chrome, css-grid, magnetic, justify-self, column-gap, layout-fix, regression, ssr-only, no-js-delta]
    summary: Fixes the homepage nav's cart pill visually crowding the last nav link. Root cause — `.nav-cta` had `justify-self: end` but the button was wrapped in a `<Magnetic>` div, so the magnetic wrapper became the actual grid child and stretched to fill column 3 with the cart button left-aligned inside it (directly adjacent to nav-center's right edge). Fix moves `justify-self: end` to a `.nav > .magnetic` selector and sets `display: inline-flex` on the wrapper so it sizes to the cart pill, keeping the magnetic translate tight. Adds `column-gap: 32px` to `.nav` for guaranteed breathing room — anticipates the future 5th nav link (/journal) without re-tuning. Tab order preserved; no markup or JS changes; reduced-motion respected (no new motion). Net diff: 1 file, +7 / -1 LOC. Task-driven (Notion page 35faf8d3-d3e2-8117-9ec0-ffb57a33491c). Risk band: low.

  - id: pdp-quantity-selector
    title: PDP quantity selector — italic-serif numeric, hairline-rule stepper on every /supplies/<id>
    commit: 204bc81
    date: 2026-05-13
    surface: catalogue
    tags: [pdp, quantity-selector, cart, italic-serif, oldstyle-nums, tabular-nums, hairline-rule, aria-live, role-group, keyboard-arrow-keys, focus-visible, prefers-reduced-motion, primitive, shared-component, store-api-extension, default-arg-back-compat, sibling-export, no-new-tokens, no-new-deps]
    summary: Adds a quantity selector to AddToCart on every PDP — removes the "click Add, open drawer, stepper to 3" three-step friction for multi-unit intent. New `<QuantitySelector />` primitive at `src/components/quantity-selector.tsx` (~70 LOC) — `role="group"` wrapping `<button>−</button>`, an `aria-live="polite" aria-atomic="true"` italic-serif display (oldstyle + tabular nums, zero-padded to 2 digits), and `<button>+</button>`. Disabled at min/max; keyboard ArrowLeft/Down decrement, ArrowRight/Up increment when focus is in the group; per-call `Math.max(1, Math.floor(quantity))` guard against negative/non-int bypass attempts. `cart.add()` signature extended at `src/lib/cart.ts:91` to `add(productId, productTitle?, quantity = 1)` — accumulates qty in existing line, caps at the existing per-line 99 ceiling; default-1 keeps 6 homepage AddToCart call sites + the legacy AddToCart export source-compatible. New `<PDPAddToCart />` sibling export in cart-island.tsx owns local quantity state + the existing `added` ephemeral state; renders QuantitySelector adjacent to the existing `.chapter-cta` button (max=9 reads as edition limit, not generic numeric cap). Legacy `<AddToCart />` unchanged — homepage product cards keep their single-click commit register. `/supplies/[id]/page.tsx` swaps the AddToCart import + render inside the existing `<Reveal>`/`<Magnetic>` wrapper; no other PDP markup changed. CSS register at `globals.css:4986+` (~60 LOC) — pill (`1px solid var(--color-line-2)`, `border-radius: 999px`, 44 px tall) at 1.4× the cart-drawer stepper scale; display + buttons share `font-family: var(--font-serif); font-style: italic; font-size: 22px; font-variant-numeric: oldstyle-nums tabular-nums` — the same oldstyle-nums grammar as the press-clipping register, the colophon dl, and the cart drawer count. Focus-visible: `1px solid var(--color-line-1)` outline. `prefers-reduced-motion: reduce` zeroes the step-button transition. Tokens only; zero new tokens, zero new deps, zero existing-token redefinitions. CTA `aria-label` is now dynamic (`Add ${quantity} of ${productTitle} to cart`) so AT users hear the quantity reflected on the verb itself in addition to the live-polite display update. Establishes the QuantitySelector primitive that future checkout/related-edition surfaces can consume directly. Task-driven (Notion page 35faf8d3-d3e2-818e-865d-f4d9e50c6234). Risk band: medium. Net diff: 5 files, +136 / -7 LOC.

  - id: split-text-word-break-fix
    title: SplitText display titles wrap mid-character at line edges — add `white-space: nowrap` to `.split-word`
    commit: fe9e6af
    date: 2026-05-13
    surface: system
    tags: [splittext, primitive, css-utility, white-space-nowrap, inline-block, word-wrap, display-type, clamp-display, hero, faq, pdp, journal, codex, manifesto, outro, 404, regression-fix, layout-fix, ssr-stable, no-markup-change, no-js-delta]
    summary: Fixes the strongest typographic moment on the site (clamp-display titles wrapped in `<SplitText>`) from breaking mid-character at line edges. Root cause — `.split-word` was `display: inline-block; overflow: hidden;` with no `white-space: nowrap`; each `.split-char` inside is also `inline-block`, so the browser treats adjacent chars as break opportunities and wraps at the line edge mid-word. Visible at every standard desktop viewport on the FAQ display title `'Questions, patiently answered.'` — `PATIENTLY` shredded as `PATIE`/`NTLY`, `ANSWERED` as `ANSW`/`ERED`. Same latent failure mode on every other clamp-display surface that wraps a title in `<SplitText>` (hero `'Dark Matter.'`, all `/supplies/<id>` PDPs, every `/journal/<slug>` post title, `/checkout` sealed state, codex/manifesto/outro section titles, `not-found.tsx` 'Not found.'). Fix is a single 1-line rule addition (+5 lines of WHY comment) to `.split-word` in `src/app/globals.css:311–321` — `white-space: nowrap`. Each word now stays whole as an atomic inline-block; word boundaries still break via the parent `.split` inline-flow at `.split-space` separators. Zero markup change, zero JS delta, zero new tokens; behavioral change is purely visual at >= 1024 viewports where individual words actually fit within the container but the inline-block char layout was wrapping them anyway. Verified with capture-ship `faq-desktop.png` / `faq-mobile.png` at HEAD 56b61ad — FAQ display title renders as `QUESTIONS,` / `PATIENTLY` / `ANSWERED.` on three clean lines, no horizontal scrollbar at 1280/1440/1920. Hero `Dark Matter.` outline-stroke + asymmetric word 2 composition preserved (the .hero-word `display: block` wrapper was already forcing line break between Dark and Matter, so the fix is a no-op for hero in terms of layout but defensive at extreme zoom). `prefers-reduced-motion` untouched (no new keyframes or transitions). Task-driven (Notion page 35faf8d3-d3e2-8186-aaf2-c77347d913bf). Risk band: medium. Net diff: 1 file, +6 / 0 LOC.

  - id: journal-display-vocabulary-align
    title: /journal index display heading — align with hero/PDP/journal-post vocabulary (SplitText + outline-stroke word 2)
    commit: 7add279
    date: 2026-05-14
    surface: system
    tags: [journal, display-title, hero-vocabulary, splittext, webkit-text-stroke, outline-stroke, italic-serif, asymmetric-composition, word-1-word-2, scroll-reveal, prefers-reduced-motion, register-coherence, no-new-deps, no-new-tokens]
    summary: "Closes the last divergence in BFS s display-title vocabulary. The homepage hero, every /supplies/<id> PDP, and every /journal/<slug> post all share an asymmetric two-word composition (word 1 solid italic-serif, word 2 outline-stroked via -webkit-text-stroke, per-char SplitText reveal with a staggered start). The /journal index s .journal-display rendered as a plain two-line clamp(56,10vw,144) flex stack — italic only on word 2, no SplitText, no outline. Fixed by promoting markup to the same word-1/word-2 stack (src/app/journal/page.tsx:101–119) and evolving the .journal-display CSS block (src/app/globals.css:6093–6134, +27/-7 LOC) to add .journal-display-word-1/2/.journal-display-outline rules + .journal-display-period inline-block. The smaller clamp scale (clamp(56px, 10vw, 144px)) is intentionally preserved — the index is a chapter heading, not the cover; oversizing it would flatten the hero s primacy. Word-2 indent matches existing asymmetric grammar (padding-left: clamp(40px, 9vw, 132px)). SplitText reuses the existing primitive — three instances on the page (The, the period, Journal) with start={0.22} on word 2 so the outline-stroked italic reads as an editorial accent that lands after the solid word. <h1> carries aria-label=\"The Journal.\"; inner scaffold spans are aria-hidden. Reduced-motion is handled by the global .split-char guard at globals.css:3706–3726 — no new keyframes, no new RM logic needed. Checkout heading intentionally left alone (the task brief explicitly notes its register is functional restraint). PDP + journal-post titles audited — both already match the canonical vocabulary, no edit needed. Net diff: 2 files, +36 / -9 LOC. Task-driven (Notion page 35faf8d3-d3e2-8147-b2a0-dadeb0e69bf6). Risk band: medium. Calibration day — rubric-calibrator fired this run (verdict DRIFTING, captured at .claude/improvement/calibrations/2026-05-14.md)."
