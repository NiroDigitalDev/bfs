  - id: focus-ring-token-sweep-checkout-and-journal
    title: Focus-ring token sweep — remove 6 dim overrides so checkout + journal interactive elements inherit the strong global :focus-visible
    commit: 9ca8f0c
    date: 2026-05-14
    surface: chrome
    tags: [a11y, focus-visible, wcag-247, focus-ring, token-drift, global-rule-inherit, css-deletion, no-jsx-change, no-new-primitives, no-new-deps, deep-discovery, regular-pick]
    summary: "Removes 6 weak focus-visible overrides in src/app/globals.css that silently regressed focus visibility on cross-cutting interactive elements. The site has a strong global :focus-visible rule at globals.css:80-86 (outline: 2px solid var(--color-ring); outline-offset: 4px; border-radius: inherit; box-shadow: 0 0 0 6px rgba(0,0,0,0.5); transition: outline-offset var(--dur-1) var(--ease-out-quart)) that's deliberately built for visibility against grain/mix-blend chrome and dim ground. Six selectors quietly overrode it with a much weaker pattern (outline: 1px solid var(--color-line-2); outline-offset: 4-6px — drops the 6px black halo box-shadow, drops the transition, halves the ring weight, and swaps --color-ring #ffffff for --color-line-2 #2a2a2a). On a matte black ground at low contrast that's a WCAG 2.4.7 fail. The override sites: .checkout-input:focus-visible (line 5827), .journal-foot-return:focus-visible (line 6675), .journal-breadcrumb-link:focus-visible (line 6730), .journal-prose a:focus-visible (line 6982), .journal-post-return:focus-visible (line 7038), .journal-related-link:focus-visible (line 7117). Pattern was added as part of the checkout-route ship (commit 2080591) and replicated when the /journal/[slug] route landed; the dimmer style appears to have been a 'don't overpower long-form prose' instinct that ended up failing the broader a11y discipline. The fix is one-line — delete each override rule. The global :focus-visible already cascades correctly through descendant selectors (.journal-prose a still gets the per-element hover/focus background-size:100%-1px underline reveal AND the 2px white ring with halo; .checkout-input keeps its border-bottom-color:rgba(255,255,255,0.6) :focus state AND the strong ring with halo on top). The :hover/:focus-visible companion rules (e.g. .journal-foot-return:focus-visible { color: #fff }) are preserved. Net delta — 1 file modified, ~24 LOC deleted (6 rules × ~4 lines), 0 LOC added. Verified — bun run lint 0 errors + 7 pre-existing tooling warnings in .claude/improvement/scripts/*.mjs (unchanged set), bunx tsc --noEmit clean, bun run build 48/48 static routes (unchanged from previous run), 0 anti-patterns, compiled CSS grep on 'outline:1px solid var(--color-line-2)' returns 0 (was 6), affected class names .checkout-input/.journal-foot-return/.journal-breadcrumb-link/.journal-prose/.journal-post-return/.journal-related-link still present in compiled CSS chunks (verified via grep on .next/static/chunks/*.css). perf-a11y — 0 bytes JS delta (pure CSS deletion, no JSX touched), CSS net reduction ~700 bytes pre-minification, no LCP/CLS/INP impact (focus rings only paint on keyboard interaction). a11y — net win: WCAG 2.4.7 Focus Visible now passes on 6 cross-cutting elements with proper 2px white + 6px halo + 4px offset + transition. The transition (outline-offset var(--dur-1) var(--ease-out-quart)) means the ring animates into place rather than hard-snapping. Self-rated rubric: T:2 M:0 L:2 I:2 A:3 D:1 = 10/18 (Solid; clears the >8 abort threshold; the T2 is for trust-the-global-system token discipline rather than per-surface re-invention, L2 is for the consolidation around a single global rule which reduces drift surface for future ships, I2 is visible to keyboard users on every focused interactive element across checkout + journal routes which is 6 distinct interaction sites, A3 closes a real WCAG hole on 6 elements simultaneously, D1 acknowledges the move is clean but not register-defining — it's letting the existing system do its job). Risk band: low — pure CSS deletion in a non-token block, no JSX changes, no new selectors, no shared primitives, no SEO surface, no config files, net delta well under 100 LOC, 1 file touched. Direct-commit to main per risk-rules.md low-band default. Picker note — regular-discovery pick this run (not task-driven). The two open To-do Notion tasks (image-gen 35faf8d3-d3e2-8168-9026-c7ce8590e62b and motion-vocabulary 35faf8d3-d3e2-816e-9304-f18860d09138) are both still flagged as split candidates by the prior run's documented follow-ups; the picker deferred them again per the same risk reasoning the previous picker logged (compound risk of splitting + first-time-use of image-gen + autonomous-verification within the cron window). Instead picked a high-rubric a11y/hygiene S-effort move from the open backlog that the historian/auditor records had filed weeks ago but consistently lost the focus race. Verified the 6 override sites by reading the actual current line numbers (globals.css drifted slightly since 2026-05-13 when checkout-input-focus-ring-token-drift was filed — original line 5326-5329 reference is now 5827-5830 due to intervening ships; the override pattern is unchanged). Closes 2 open backlog items: checkout-input-focus-ring-token-drift (medium severity, a11y class — explicitly targeted, fix matches the proposed alignment to --color-ring) and checkout-form-floating-label-dead-selector (NOT closed here — verified in this run's discovery that the dead selector .checkout-input:focus ~ .checkout-label IS still present at globals.css:5847 but the :focus-within > .checkout-label companion at line 5848 already handles the micro-interaction correctly, so the user-visible effect is fine — backlog item is partially closed-by-drift, kept open as a hygiene follow-up to delete the dead selector). Closes 1 backlog item by drift: index-menu-focus-ring (low severity, a11y — the IndexMenu link's :focus-visible rule at globals.css:622-624 only changes color, the global :focus-visible rule at line 80-86 still applies the strong 2px ring on top, so the original auditor finding that 'index-menu-link relies on color-only :focus-visible' was a misread — the global cascade already provides the ring). Follow-ups uncovered: focus-ring-token-sweep-extended-audit (low — sweep other rare overrides; rough grep on 'outline.*1px solid' in globals.css beyond color-line-2 to catch any other accidental focus-ring weakening); checkout-form-floating-label-dead-selector-cleanup (low — delete the truly-dead .checkout-input:focus ~ .checkout-label rule at globals.css:5847 since :focus-within > .checkout-label at 5848 already does the work; the dead selector is harmless but is dead code that confuses future maintainers); journal-related-link-outline-offset-was-6px (low — three of the deleted overrides used outline-offset:6px instead of the global default 4px; the global 4px is fine for all 6 sites but if a future surface-level audit decides journal cards specifically want more breathing room, file a focused outline-offset variant per surface rather than dropping back to the dim 1px gray pattern); audit-other-focus-ring-systems (low — verify whether any other elements have :focus-visible overrides that diverge from the global rule and should be aligned)."

  - id: chapter-numeral-scroll-driven-drift
    title: "Chapter numerals — scroll-driven counter-parallax (per-element animation-timeline: view()) on the 6 homepage chapter spreads"
    commit: 1732445
    date: 2026-05-14
    surface: catalogue
    tags: [hero, catalogue, chapter, typography, motion, scroll-driven, animation-timeline, view-timeline, css-only, no-js, no-new-primitives, no-new-deps, reduced-motion, supports-fallback, awwwards-current, regular-pick]
    summary: "Adds per-element scroll-driven counter-parallax to the six oversized italic-serif chapter numerals on the homepage catalogue spreads (#supplies). Pure CSS — uses native animation-timeline: view() so each numeral binds to its OWN chapter's viewport position, not the global --scroll-y. As a chapter enters and exits the viewport, its numeral drifts from translate3d(0, 80px, 0) → translate3d(0, -80px, 0). Previously the numerals were inert until :hover (globals.css:1361) — now they drift counter to the figure on scroll, reading as composition rather than decoration. Net delta — 1 file modified, +22 LOC: one @supports (animation-timeline: view()) block wrapping a @media (prefers-reduced-motion: no-preference) and (min-width: 900px) block, containing the .chapter-numeral { animation: chapter-numeral-drift linear both; animation-timeline: view(); animation-range: entry 0%25 exit 100%25; } rule plus the @keyframes chapter-numeral-drift definition (from→to translate3d Y ±80px). Inserted at globals.css:1359-1380 immediately after the existing .chapter:hover .chapter-numeral rule so hover priority is preserved in source order. Gating discipline — triple gate: (1) @supports animation-timeline: view() blocks non-supporting browsers (Chrome <115, Edge <115, Safari <18 — fall through to current static behavior, zero regression); (2) prefers-reduced-motion: no-preference excludes the entire animation block for users who prefer reduced motion; (3) min-width: 900px aligns with the existing mobile-reposition rule at line ~1352 (max-width: 899px overrides numeral position for narrow viewports — small numerals shouldn't animate). Animate transform ONLY — stroke-color stays under base + hover rules so :hover { -webkit-text-stroke-color: rgba(255,255,255,0.16) } still brightens on hover. The translate3d() promotes the numeral to its own compositor layer; layout flow unaffected (position: absolute; top: -0.22em; z-index: -1 preserved). Why view() over --scroll-y — the existing ParallaxRoot writes window.scrollY to :root which is a global value; if six numerals all consumed it they would translate in lock-step rather than relative to their own chapter's viewport entry. Native CSS view() timeline gives per-element relative parallax with zero JS. Verified — bun run lint 0 errors + 7 pre-existing tooling warnings (unchanged set in .claude/improvement/scripts/*.mjs), bunx tsc --noEmit clean, bun run build 48/48 static routes (unchanged), SSR HTML for / still contains 6 .chapter-numeral spans, 0 anti-patterns. perf-a11y — 0 bytes JS delta (CSS-only), no LCP risk (decorative absolutely-positioned glyph off critical path, transform is composited), no CLS risk (transform doesn't trigger layout by spec), no INP risk (scroll-driven via native compositor, no JS scroll listeners). Reduced-motion respected (entire @supports block excluded by @media (prefers-reduced-motion: no-preference)). Non-supporting browser path: numerals render static as before — zero regression. Mobile (≤899px) path: numerals render static as before (gate matches existing layout cutoff). Adjacent-surface regression PASS — homepage chapter-numeral count = 12 (6 className tokens + 6 glyph tokens, unchanged), chapter-rail count 27, running-folio count 1, specimen-plate count 246 — all match pre-ship baseline. Keyframe uniqueness verified — chapter-numeral-drift collides with 0 other @keyframes (grain, load, pulse, scrollLine, marquee, bumpcount, cart-line-in, folio-rise, folio-typeset, checkoutSealEnter, cookie-banner-rise are the other 11 named keyframes, all distinct). Self-rated rubric: T:2 M:3 L:3 I:1 A:2 D:3 = 14/18 (Distinctive). T:2 — italic-serif folio glyph reused at full display scale; drift makes the typography itself read as composition. M:3 — per-element view() timeline is the current cutting-edge CSS motion technique; most Next.js sites still hand-roll IntersectionObserver + setState for similar effects, this is purely declarative. L:3 — six chapter spreads gain compositional rhythm via the same gesture; the catalogue surface becomes one composed page rather than six stacked panels. I:1 — no new interactive affordance; :hover stroke change still wins. A:2 — decorative element, transform-only (no contrast change), gated by reduced-motion + @supports + min-width fallback. D:3 — scroll-driven animation via native CSS view() timeline is an Awwwards-tier 2026 move; competes with hand-rolled GSAP scroll-trigger setups at fraction of the cost. Risk band: low — pure additive CSS, gated three ways, no primitive change, no JSX touched, no shared component, no SEO surface, 1 file 22 LOC. Direct-commit to main per risk-rules.md low-band default. Picker note — regular-discovery pick this run (not task-driven). The two open To-do Notion tasks (image-gen + motion-vocabulary) remain deferred — same compound-risk reasoning the prior 2 pickers logged (splitting + first-time-use-of-image-gen-skill + autonomous-verification window). The motion-vocabulary task explicitly lists view-transitions-page-turn / character-by-character-drift-on-scroll / optical-axis-scroll as candidate moves; this ship lands a smaller, more focused single move from the same family (per-element view() timeline on chapter numerals) without needing the full split. The bigger motion-vocabulary task remains valid as a future surface-by-surface extension. Discovery sources — homepage hero auditor flagged chapter-numeral-static-no-scroll-coupling as the highest-leverage M-effort distinctive move (file:line globals.css:1325-1341); historian confirmed catalogue surface NOT touched recently (the 2-ago catalogue ships were PDP customer-reviews 361d51c and PDP editorial sections a635f7c, both /supplies/[id] not the homepage catalogue cells); auditors PDP+catalogue + system+chrome agreed surface freshness favored a homepage move. Follow-ups uncovered: chapter-numeral-drift-token-promotion (low — the 80px drift literal is a defensible one-off but if a second scroll-driven parallax instance lands, promote to --chapter-drift: 80px var); hero-aside-rule-static-no-scale-in (low — auditor flagged .hero-aside-line hairline appears as a finished line under the staggered SplitText chars; could scale-in to match the chars stagger); section-tag-eyebrow-mark-rule-collision (low — .section-tag::before and .chapter-eyebrow-mark are identical 24px×1px hairlines at rgba(255,255,255,0.4); auditor flagged as flat hierarchy worth differentiating); hero-spec-counter-no-viewport-gate (medium — auditor flagged that <Counter to={99.9}/> in the spec ribbon likely fires on mount rather than being viewport-gated like SplitText/Reveal). Closes 1 backlog item by drift: newsletter-id-collision (high severity, a11y — historian verified that src/components/checkout-form.tsx now uses useId() exclusively at line 196 → id={emailId}, which React 19 generates as :R…: style identifiers that cannot collide with newsletter.tsx:20 literal id=email regardless of co-mounting; the collision the auditor flagged at press-clipping-register run on 2026-05-13 is not possible under the current implementation, marking closed-by-drift)."

