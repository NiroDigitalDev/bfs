    files: [src/components/manifesto-list.tsx, src/app/page.tsx, src/app/globals.css]
    summary: "Closes the manifesto cold-surface gap. The CH. 03 / Position section's four items were rendering as Inter-800 uppercase cards with tracked padStart numerals — the last 'agency three-card pattern' left on the homepage's load-bearing narrative arc. Recast `.manifesto-item h3` from `font-weight: 800; text-transform: uppercase; font-size: clamp(22px,2vw,30px)` to `font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: clamp(34px,4vw,56px); letter-spacing: -0.01em; line-height: 1.05` and recast `.manifesto-num` from `font-size: 14px; font-weight: 800; letter-spacing: 0.2em` to `font-family: var(--font-serif); font-style: italic; font-feature-settings: \"onum\" 1; font-size: clamp(22px,2vw,28px)` — italic-serif marginalia numerals matching the codex register. Added scroll-bound active state: items toggle `data-active=\"true|false\"` based on IntersectionObserver entries with `rootMargin: \"-25% 0px -25% 0px\"` and `threshold: [0,.25,.5,.75,1]` firing when `entry.intersectionRatio > 0.5`. Active state lifts h3 color 0.7→1.0, intensifies letter-spacing -0.01em→-0.025em (typographic re-typesetting), shifts h3 translateX 0→2px and num translateX 0→-2px (marginalia drift toward+away registration), lifts p color 0.55→0.85 and num color 0.35→1.0. All transitions 480ms `var(--ease-out-quart)`. New client component src/components/manifesto-list.tsx (~58 LOC, \"use client\") owns the IO subscription: on mount checks `prefers-reduced-motion: reduce` and short-circuits to all-items-active (no IO, no transitions fire), otherwise spawns one shared observer across the 4 li refs. SSR-renders all four items with initial `data-active=\"false\"` so the markup is hydration-safe — no flash. Reduced-motion fallback in CSS pins letter-spacing to resting (-0.01em) and transform: none, downgrading all transitions to color-only 240ms linear so glyph metrics never shift. Picked this run as highest non-disqualified total (T:3 M:2 L:3 I:2 A:3 D:3 = 16/18 Awwwards-grade) over hero-type-instrumental @ 15/L and motion-vocabulary-beyond-reveal @ 13/L; retro tiebreaker on lifetime cold surface (manifesto = 0 ships at n=53 before this) confirmed the pick. Verified — bun run lint 0 errors + 7 pre-existing tooling warnings (unchanged set in .claude/improvement/scripts/*.mjs), bunx tsc --noEmit clean, bun run build 48/48 static routes (unchanged), 0 anti-patterns. SSR class-grep on /: class=\"manifesto-list\" 1×, class=\"manifesto-item\" 4×, all four titles verbatim, numerals 01-04 in <span class=\"manifesto-num\">, all four <li> emit `data-active=\"false\"` initial SSR state. perf-a11y PASS-WITH-FOLLOWUPS — bundle delta well under +1.5KB target (one IO + ref array replaces 4 Reveal wrappers, source delta ~+60 LOC of TSX, gzipped much smaller), CSS delta ~+39 net lines / ~+1.0KB raw / ~+0.4KB gzipped at the +1KB boundary, no LCP risk (manifesto is mid-page CH.03 not above fold), CLS risk absent at runtime (data-active transitions only color/letter-spacing/transform: translateX(2px); none affect block flow; SSR-rendered h3 size is final on first paint), INP risk none (IO is passive, single setAttribute per entry), keyboard navigation unaffected (no new focusable elements), reduced-motion override complete in both JS and CSS layers (pinned letter-spacing + transform: none), contrast — h3 resting 0.7 alpha ≈ 10.0:1 / active 1.0 ≈ 20.1:1 both AAA-large, p resting 0.55 ≈ 6.5:1 / active 0.85 ≈ 14.7:1 both AA-body, num resting 0.35 ≈ 3.3:1 (passes 3:1 for large display 22-28px serif, decorative ordinal; below 4.5:1 if a stricter policy is applied) / active 1.0 ≈ 20.1:1. regression-spotter PASS — manifesto signature renders exactly per spec (1× list, 4× item, 4× numerals 01-04, 4× data-active=false, all 4 titles verbatim); every adjacent surface intact (.manifesto-sticky 2×, .manifesto-credo 2×, .press-stamp-tray 2×, .section-title 8×, codex .codex-row/.codex-rule/.codex-eyebrow 6× each, CH.04 pullquote 4× via .pullquote-body, 5× .press-clipping, .outro-colophon-wrap + .colophon-press 2× each, .from-journal 1× + .from-journal-item 4×, PDP .related-grid + .related-item 2× + .related-plate 2× + .related-figure 2× + 41× .spec-plate intact on all 6 PDPs). diff-reviewer PASS-WITH-NITS — no any, no @ts-ignore, no console.*, no scope creep, reduced-motion guarded in both CSS and JS, SSR-safe typeof window check present; medium nit on dead Reveal import was non-issue (grep confirms 13 Reveal usages remain in page.tsx); low nits on rgba(244,244,244) inline literals (paper-alpha ramp convention is established across globals.css — promotion to alpha-stop token would be premature) and single-letter t/d prop names (matches the original inline convention — exported type kept terse). Risk band: medium per risk-rules.md — new client component + new transition (letter-spacing) affects glyph metrics. Direct-commit to main per medium-band default + screenshots target on both viewports (screenshots skipped — stale next-server PID still holds port 3000, carry-over blocker). SOTD compare skipped — sotd_parser_available:false. /review skill skipped per routine — focused single-surface ship with PASS verdicts across all 5 Phase 5 gates; review value would be re-reading the same diff. Follow-ups: manifesto-credo-active-correspondence (medium, distinctive — sticky .manifesto-credo could mirror the active item's italic numeral as a marginalia <sup>; out-of-scope this ship); manifesto-num-resting-contrast-policy (low, a11y — resting 0.35 alpha sits at 3.3:1, passes 3:1 large-text but BFS body-floor policy worth documenting; bump to 0.45 if stricter); manifesto-p-body-alpha-drop-documentation (low, hygiene — p resting alpha dropped 0.65 → 0.55, still AA but worth noting in design tokens); stale-next-server-on-3000-blocks-capture-ship (medium, infra — carried over from prior 4 ships); lighthouse-baseline-seed (low, infra — .claude/improvement/lighthouse.csv is header-only; first perf-touching ship should establish baseline)."

