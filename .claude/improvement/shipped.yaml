    summary: "Adds two editorial sections to every /supplies/[id] PDP — Press notes (per-product) and Dispatch & care (shared with one per-product Care override) — addressing the explicit gap noted in the task brief that the existing PDP composition feels under-populated for what a real edition's detail page should carry. Press notes lands as a Reveal-staggered .pdp-press-prose grid of 3 italic-serif paragraphs per product (17–19px serif body at 68ch max-width, 0.78 alpha), preceded by a Reveal-wrapped .pdp-press-eyebrow ('Editorial · Press notes' italic-serif 13px uppercase letterspaced 0.18em at 0.42 alpha) and a 1px var(--color-line)-tone hairline rule, with the .pdp-press-display h2 'Press notes.' set at clamp(28,4vw,44) italic-serif (carries the same word-break:keep-all + overflow-wrap:break-word + hyphens:manual defensive vocabulary the about-display + faq-display gained this volume to neutralise the mid-word wrap failure mode). Reveal delays stagger 0.08s/0.14s/0.20s across the three paragraphs. Per-product content (extending the Product type with `pressNotes: string[]`) was written in BFS voice for all 6 editions: void-book's notes describe the seven-stock test and the matte coat that 'reads as a held breath, not a polished surface,' the Smyth-sewn signatures that lay flat, and the 12 studio-reserved copies per 250 run; abyssal-cardstock describes the dyed-through core that survives blade/laser/folding bone and the 500 GSM threshold as the point at which paper 'begins to register as material'; event-horizon-pad describes the four-pass tooth that anchors pastel, lifts charcoal cleanly, and holds gouache plus the 350gsm cover that 'carries the pad in a flat case without complaint'; sticky-voids describes the high-tack/low-residue chemistry that 'holds without leaving permanence behind' and the 70gsm stock tested first on BFS's own paper; savior-pen names the silver-pigment gel as calibrated against BFS paper but 'patient with the paper you have on hand' and is plainly honest that 'the pen does not pretend to be a fountain pen'; executive-despair on the undated weekly that doesn't number years, the 90% K deboss on hundred-gram black 'you can read with the fingertips,' and the Bordeaux foil along the spine as 'the only colour we permit.' The Dispatch & care section follows under a matched .pdp-press-eyebrow ('Provenance · Dispatch & care') + hairline rule, rendering a .pdp-dispatch-dl with 5 .pdp-dispatch-row entries: Dispatch ('48 hours · Tracked · Worldwide'), Care (per-product `careNote` field — paper editions get variants like 'Keep dry · Avoid open sun · Open at room temperature' or 'Avoid moisture · Stack flat · Cut with a fresh blade'; pen gets 'Cap firmly between strokes · Store horizontal in a closed drawer'; planner's foil-aware 'Foil does not require buffing'), Edition cap ('No run exceeds 250 numbered copies'), Returns ('Opened editions cannot be returned · Damaged-on-receipt: write within 7 days'), and Correspondence (mailto:studio@blacksforsale.studio rendered through a new .pdp-dispatch-mail anchor that mirrors the .outro-colophon-mail hairline-underline + hover-brighten vocabulary). The dispatch dl reuses the colophon-row layout (140px → 200px @ min-width:720px responsive key column, ui-monospace 10px 0.24em letterspaced uppercase keys, 15px tabular-nums values) so the new section reads as a structural continuation of the existing .pdp-colophon rather than a competing register. Reveal staggers each row at 0.06+i*0.04s. Net delta — 3 files, +200/0 LOC: src/data/products.ts +71 (Product type gets `pressNotes: string[]` + `careNote: string`; 6 product entries each gain 3 pressNotes paragraphs + 1 careNote — strictly additive, no shape break since the type extension required every product to be updated in the same commit), src/app/supplies/[id]/page.tsx +59 (two new <section> blocks inserted between .pdp-actions and <RelatedProducts current=...>, both reusing the existing Reveal primitive — zero new client deps), src/app/globals.css +120 (new block at globals.css:5442-5561 covering .pdp-press + .pdp-dispatch container padding, .pdp-press-eyebrow + .pdp-press-rule shared register tokens, .pdp-press-display h2 with defensive wrap vocabulary, .pdp-press-prose grid + paragraph type, .pdp-dispatch-dl + .pdp-dispatch-row + .pdp-dispatch-mail mirror of the .pdp-colophon vocabulary, including the @media (prefers-reduced-motion: reduce) zero-transition guard on the mail anchor). Reuse-over-invent strictly observed — every motion uses the existing Reveal primitive (already RM-guarded), zero new keyframes, zero new fonts, zero new tokens, zero new design primitives, and the dispatch row layout is a deliberate clone of the colophon-row so the editorial spread reads as one continuous provenance ladder rather than five separately-styled sections. Verified — bun run lint 0 errors + 7 pre-existing tooling warnings in .claude/improvement/scripts/*.mjs, bunx tsc --noEmit clean, bun run build 28/28 static routes (same count as prior ship — 6 supplies/[id] paths all prerendered with the new sections), regression check (SSR class grep on all 6 PDPs at /supplies/void-book, /supplies/abyssal-cardstock, /supplies/event-horizon-pad, /supplies/sticky-voids, /supplies/savior-pen, /supplies/executive-despair) — every PDP renders 1 <section class=\"pdp-press\"> + 1 <h2 class=\"pdp-press-display\"> + 1 .pdp-press-prose grid + 3 prose paragraphs + 1 <section class=\"pdp-dispatch\"> + 5 .pdp-dispatch-row entries + 1 .pdp-dispatch-mail mailto anchor; .pdp-colophon-row count unchanged at 12 occurrences per PDP (6 rows × 2 grep matches), Product JSON-LD intact, BreadcrumbList JSON-LD intact, .pdp-addtocart + .pdp-outro + .related (RelatedProducts) sections all still render below the new spread; adjacent surface regression PASS — / shows 12 chapter-figure-frame + 2 outro-grid + 10 nav-num + 4 /journal anchors + 1 /about anchor, 0 pdp- class contamination on /, /journal, /about, /checkout (no cross-route style bleed); 0 anti-patterns. Self-rated rubric: T:2 M:1 L:2 I:1 A:3 D:2 = 11/18 (Distinctive). T:2 because the press-notes block extends the journal-prose vocabulary into the PDP surface (italic-serif body at 17–19px, 68ch max-width) without inventing a new type system; M:1 because motion is minimal (Reveal stagger on every new beat, no SplitText, no new keyframes — the entire visual moment is composition + register, not motion); L:2 because the section rhythm (eyebrow → hairline → display → prose → eyebrow → hairline → dl) reads as one continuous editorial spread rather than two adjacent widgets; I:1 for the .pdp-dispatch-mail hover-underline + Reveal staggers + reduced-motion guard; A:3 because each section carries an aria-label, the dl uses semantic dt/dd, the mail anchor is keyboard-reachable with the existing :focus-visible token, and zero motion fires without a reduced-motion fallback (Reveal handles it natively, the .pdp-dispatch-mail transition is explicitly zeroed under RM); D:2 because per-product editorial press-notes in BFS voice on a stationery PDP is genuinely uncommon — the typical e-commerce PDP carries spec lists and stock photos, not three italic-serif paragraphs about the seven stocks tested or the foil that 'makes faith visible' — and the dispatch dl that mirrors the colophon-row vocabulary lets the section read as a structural continuation of the provenance ladder rather than a tacked-on returns policy. Risk band: medium per task brief (3 files modified, 0 new files, 0 new primitives, 0 new routes — type-only Product extension that all 6 product entries fulfill in the same commit). Task-driven (Notion page 35faf8d3-d3e2-8188-a138-ddf72125fe36 'PDP — add more editorial sections (specimen-detail, edition-history, dispatch-notes, related editions)'). Two of the four brief-named sections shipped (press notes covers 'edition history / press notes'; dispatch & care covers 'dispatch-notes'); the other two (specimen-detail and an 'In the press' pull-quote variant) were deliberately deferred — specimen-detail would need new closeup imagery (pairs with the open generate-distinctive-images task), and 'In the press' quotations would overlap with the open pdp-customer-reviews task. Follow-ups: pdp-press-notes-specimen-detail (medium — task brief mentions a second full-bleed specimen plate showing a tighter detail; pairs with generate-distinctive-images), pdp-press-notes-illustration (low — type-only register on the press-notes section currently, could pair with a press-stamp or typesetter's tray composition once image-gen lands a register-coherent asset), pdp-care-tokenize (low — care row strings are inline per-product literals on Product; could lift to a shared CareCategory enum + per-product key mapping if more products land)."

  - id: journal-prose-drop-cap-and-hanging-punct
    title: "Journal prose — drop-cap, hanging punctuation, small-caps lede"
    commit: 4ab2be3
    date: 2026-05-14
    surface: editorial
    tags: [journal, journal-prose, editorial, typography, drop-cap, first-letter-pseudo, first-line-pseudo, hanging-punctuation, small-caps, font-variant-caps, italic-serif, instrument-serif, clamp-typography, css-only, no-new-deps, no-new-tokens, no-new-fonts, no-new-keyframes, scoped-selector-not-legal-prose, scoped-selector-not-about-prose, regression-spotter-caught-leak, base-class-isolation, ssr-stable, low-risk, discovery-driven]
    summary: "Three additions to the .journal-prose block in src/app/globals.css that put the long-form post body on a print-quality typographic footing, scoped to /journal/[slug] only via :not(.legal-prose):not(.about-prose) — the regression-spotter caught the base-class composition on /about + legal pages on the first verification pass and the selector was tightened before commit. (1) Drop cap on first paragraph — selector .journal-prose:not(.legal-prose):not(.about-prose) > p:first-of-type::first-letter renders the leading character at clamp(56px, 7vw, 96px) italic var(--font-serif), float:left, line-height:0.84, padding:6px 12px 0 0, full-white rgba(255,255,255,1), with -webkit-font-smoothing:antialiased to neutralise sub-pixel jitter on the large italic glyph; visually a ~3-line dropped italic that re-typesets the opening of the essay. (2) Hanging punctuation on the prose container — adds hanging-punctuation:first last allow-end; to .journal-prose (kept on the unscoped class so legal + about prose also benefit; precedent at .pullquote globals.css:2494; harmless graceful-degradation in Firefox). (3) Italic small-caps lede — selector .journal-prose:not(.legal-prose):not(.about-prose) > p:first-of-type:first-line applies font-variant-caps:all-small-caps + letter-spacing:0.04em + 0.95-alpha white; the first line inherits italic from var(--font-serif) so the opening reads as italic small-caps. Net delta — 1 file, +17 LOC, src/app/globals.css only — zero new files, zero new deps, zero new tokens, zero new fonts, zero new keyframes. Verified — bun run lint 0 errors + 7 pre-existing tooling warnings, bunx tsc --noEmit clean, bun run build 28/28 static routes (same count as prior ship — pure CSS additive). Adjacent surface regression PASS via SSR class-chain grep across all 5 .journal-prose surfaces — /journal/vol-iii-no-1-the-typography-of-black has class=\"journal-prose\" only (drop-cap fires), /about has class=\"journal-prose about-prose\" (excluded by :not), /terms /privacy /cookies all have class=\"journal-prose legal-prose\" (excluded by :not); chrome (nav, footer, cart-drawer, chapter-rail, running-folio) signatures unchanged. perf-a11y PASS — 0 bytes JS delta, ~250 bytes gzipped CSS delta, no LCP/CLS/INP risk (drop-cap floats inside the existing first-paragraph line box, no width/height tokens added, hanging-punctuation is a paint-time hint), reduced-motion vacuously satisfied (zero new keyframes/transitions/animations). diff-reviewer PASS-WITH-NITS — flagged the original color:#fff literal as a style-consistency nit, fixed inline by switching to rgba(255,255,255,1). 0 anti-patterns. Self-rated rubric: T:3 M:0 L:2 I:0 A:2 D:3 = 10/18 (Distinctive). T:3 because type behaves as a living element (drop-cap + small-caps re-typeset the opening between two pseudo-element states, hanging-punctuation is typesetting-as-craft); M:0 (intentionally static — motion would compete with the typographic moment); L:2 (drop-cap reshapes the first paragraph composition into proper editorial opening with hanging margins and a dropped counter-form); I:0 (no new interactive state); A:2 (decorative pseudos don't alter DOM, 21:1 contrast, no new focus targets, no reduced-motion concern); D:3 (the asymmetric italic-serif drop-cap + hanging-punctuation + small-caps lede vocabulary is the move that puts a long-form page on a print-quality footing — could be photographed as a printed page and identified as BFS at a glance). Risk band: low — single CSS file, no shared primitive, no layout.tsx, no page.tsx, no route change, no client boundary. Direct-commit to main per risk-rules.md low-band mapping. Discovery-driven (not task-driven) — Notion MCP unavailable this run (NOTION_TOKEN unset, notion-search returned net::ERR_FAILED). Surfaced by editorial-auditor in Phase 1 (see also six other editorial-auditor findings logged as follow-ups in backlog: journal-prose-figure-pull-quote-marginalia-vocabulary high/M/distinctive — natural sibling pick for next run; journal-prose-link-focus-ring-token-drift medium/S/a11y; journal-display-h1-aria-label-strips-actual-heading-text medium/S/a11y; article-jsonld-datemodified-equals-datepublished medium/S/seo; journal-rss-link-tag-missing-on-post-pages medium/S/seo; about-jsonld-not-organization-and-no-breadcrumb medium/S/seo) plus seven chrome-auditor findings also logged for the next chrome-surface ship. Optional progressive-enhancement followup: wrap drop-cap in @supports (initial-letter:3) so future browsers get true baseline-aligned drop-caps without the float hack."

