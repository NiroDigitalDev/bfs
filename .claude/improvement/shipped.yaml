    summary: "Subtask [3/3] of motion-vocabulary parent (Notion 35faf8d3-d3e2-816e-9304-f18860d09138). Notion subtask 360af8d3-d3e2-81ab-bdbb-fe56c3cd37ed claimed → In progress with date:Started:start=2026-05-15 via MCP notion-update-page in Phase 0; after commit completed via MCP with Status: Done, Commit: <sha>, date:Completed:start=2026-05-15, Surface: [system, hero, catalogue]. Closes the motion-vocabulary trilogy — third orthogonal mode (cursor-distance) joins scroll-driven [1/3] hero-char-drift (commit 8708f51) and hover-driven [2/3] letter-spacing (commit d618203). Extends shared <Magnetic /> primitive at src/components/magnetic.tsx with a reveal?: boolean prop (default false, backwards-compatible with all 15 existing call sites across 5 routes). When reveal=true: wrapper class becomes 'magnetic magnetic-reveal'; on (pointer: fine) + (prefers-reduced-motion: no-preference) the rAF loop additionally lerps cd (init 1) toward td (init 0) using the same 0.15 factor as the existing translate, publishing el.style.setProperty('--magnetic-distance', cd.toFixed(3)) each frame; onMove computes td = max(0, min(1, 1 - Math.hypot(mx, my) / (Math.hypot(r.width, r.height) / 2))) — linear falloff from element center (td=1) to corner (td≈0); onLeave resets td=0. Touch + reduced-motion + no-JS users bail out → CSS default --magnetic-distance: 1 carries → full opacity 1 / scale 1 at rest. One CSS rule in globals.css at line ~1466 immediately after the [2/3] @media block: '.magnetic-reveal { opacity: calc(0.65 + 0.35 * var(--magnetic-distance, 1)); scale: calc(0.96 + 0.04 * var(--magnetic-distance, 1)); }' — default 1 means full state for all fallback paths, recession only happens when JS actively writes the variable below 1. Lerp initial state cd=1 matches CSS default so first rAF frame writes '1.000' with no visible jump, then lerps to 0 over ~10 frames as td stays at 0 (cursor not over element), producing a smooth ~160ms settle from full → recessed at mount. As cursor enters 