    surface: system
    tags: [system, hero, catalogue, magnetic, magnetic-reveal, cursor-distance, css-custom-property, calc, raf, lerp, opacity, scale, motion-vocabulary, motion-vocabulary-3-of-3, additive, backwards-compatible, reduced-motion, pointer-fine, no-new-deps, no-new-keyframes, no-new-tokens, awwwards-current, task-driven, split-subtask]
