# Append-only registry of shipped moves.
#
# Read by the reference-scout each run so it doesn't re-suggest moves
# that already exist on the site. Append a new entry at the END of the
# items list whenever Phase 6 (commit) completes; never delete or
# rewrite entries (the prose history lives in IMPROVEMENTS.md).
#
# Schema:
#   id:       kebab-case slug; SHOULD match the backlog entry id if it
#             originated there, otherwise the commit-subject slug.
#   title:    short noun phrase
#   commit:   git SHA (short, 7 chars is fine)
#   date:     ISO ship date
#   surface:  hero | catalogue | manifesto | field-notes | codex |
#             faq | colophon | outro | 404 | chrome | nav | cart |
#             system | seo
#   tags:     bag of keywords for the scout's "don't re-suggest" check
#             — typographic moves, motion moves, structural moves
#   files:    primary files added/changed (for risk-weighting hotspots)
#   summary:  one-line description

