last_critic_at: 2026-05-13     # monthly cadence (≥ 28 days → fire critic)
last_calibration_at: 2026-05-14   # event-driven (every 10th ship) — shipped_count is now 40 (% 10 == 0) so calibrator IS eligible by the count rule, but the 7-day cooldown gate (today - last_calibration_at >= 7 days) blocks fire on next run (last fired earlier today 2026-05-14); calibrator will next fire on 2026-05-21 at the earliest IF shipped_count is still a multiple of 10 at that point (likely won't be — will be ~47-50 by then, next multiple-of-10 trigger at shipped_count=50)

