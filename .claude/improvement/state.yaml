# Meta-state for the improvement-cycle routine.
#
# Updated at the end of every run (Phase 6) — never by hand. The hourly
# routine reads this at Phase 0 to decide which periodic sub-routines
# (retro, critic, calibration, creativity-reset) are due to fire.
#
# Dates are ISO-8601 (date or datetime). Counters are integers.

version: 1

# Last-run telemetry — written at the end of every run.
last_run_at: 2026-05-14T07:30:00Z
last_run_commit: 53e90aa
last_run_mode: shipped   # shipped | no-focus | pr-opened

# Anti-stagnation — incremented on every no-focus run, reset to 0 on ship.
# When this hits >= 2, Phase 0 fires the creativity-reset agent before
# the historian dispatches.
consecutive_no_focus_runs: 0

# Shipped-count — incremented on every shipped (not no-focus) run.
# When this becomes a multiple of 10, Phase 0 fires the rubric-calibrator.
shipped_count: 33   # +1: legal-pages-privacy-terms-cookies direct-to-main (task-driven [1/2] split, medium risk — Notion subtask 360af8d3-d3e2-81ee-8645-da8a7db7fe7f of parent 35faf8d3-d3e2-817b-a559-eb8ffdb7938b "Add legal pages + GDPR-compliant cookie banner"; Phase 0 split the High-priority parent into [1/2] legal-pages + [2/2] cookie-banner because the parent hit 4 of 6 split heuristics — 3 new public routes + sitewide chrome + ~600-900 LOC + multiple distinct features; this run ships [1/2]: three statutory routes /privacy /terms /cookies in editorial register through a new <LegalPageFrame> Server Component (mirrors journal chrome at restrained .legal-display scale clamp(40,7vw,96), reuses .journal-prose body styling); content covers GDPR Art. 6(1)(b)+(f) + Arts. 15-22 rights + retention windows + a register-coherent no-returns line + the two localStorage keys BFS uses by name; sitemap.ts gains 3 entries at priority 0.3 / changefreq yearly; homepage outro grows a second .outro-links-statutory nav row; SiteChrome's existing pathname !== '/' guard correctly excludes ChapterRail/RunningFolio from legal routes — no SiteChrome edit needed; net diff 7 files +553/-1 LOC; build clean (27 static routes, was 24), 0 anti-patterns; subtask [2/2] cookie banner (Notion 360af8d3-d3e2-81a8-a643-e546ec8038de) remains To do for a future run; rubric T2 M1 L3 I2 A3 D2 = 13/18 Distinctive)

# Periodic cron triggers — Phase 0 compares against today's date and
# fires the corresponding agent when the gap exceeds the cadence.
last_retro_at: 2026-05-13      # weekly cadence (≥ 7 days since last run → fire retro)
last_critic_at: 2026-05-13     # monthly cadence (≥ 28 days → fire critic)
last_calibration_at: 2026-05-14   # event-driven (every 10th ship) — fired yesterday's run; next at shipped_count=40

# Optional integrations status — Phase 0 self-checks these on startup
# and degrades gracefully when they're absent or broken.
gh_available: true           # `gh auth status` ok this run
playwright_available: true   # capture-ship.mjs wrote legal-desktop + legal-mobile under 1cdc5c1/ (prior SHA — screenshots dir is gitignored, informational)
lighthouse_available: unknown  # perf-a11y skipped lighthouse (content-only SSR pages — three statutory routes with no client JS delta; lighthouse signal-to-cost poor for this band)
sotd_parser_available: false   # sotd-compare.mjs: "could not parse SOTD entry — gallery markup may have changed" (still broken — sotd-parser-fix backlog item open)

# Daily improvements.md archival check — Phase 0 reads size and rotates
# if exceeded. Recorded here so a freshly-archived run doesn't try again.
last_archival_at: ""
improvements_md_bytes: 196500   # approx after this run's entry; still under 200KB threshold

