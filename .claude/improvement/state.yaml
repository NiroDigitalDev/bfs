# Meta-state for the improvement-cycle routine.
#
# Updated at the end of every run (Phase 6) — never by hand. The hourly
# routine reads this at Phase 0 to decide which periodic sub-routines
# (retro, critic, calibration, creativity-reset) are due to fire.
#
# Dates are ISO-8601 (date or datetime). Counters are integers.

version: 1

# Last-run telemetry — written at the end of every run.
last_run_at: 2026-05-13T19:00:00Z
last_run_commit: 204bc81
last_run_mode: shipped   # shipped | no-focus | pr-opened

# Anti-stagnation — incremented on every no-focus run, reset to 0 on ship.
# When this hits >= 2, Phase 0 fires the creativity-reset agent before
# the historian dispatches.
consecutive_no_focus_runs: 0

# Shipped-count — incremented on every shipped (not no-focus) run.
# When this becomes a multiple of 10, Phase 0 fires the rubric-calibrator.
shipped_count: 28   # +1: pdp-quantity-selector direct-to-main (task-driven, medium risk — Notion task PDP quantity selector; new <QuantitySelector /> primitive + cart.add(qty) extension + <PDPAddToCart /> sibling export wired into every /supplies/<id>, italic-serif oldstyle-nums display, hairline-rule pill, keyboard arrows, reduced-motion guard)

# Periodic cron triggers — Phase 0 compares against today's date and
# fires the corresponding agent when the gap exceeds the cadence.
last_retro_at: 2026-05-13      # weekly cadence (≥ 7 days since last run → fire retro)
last_critic_at: 2026-05-13     # monthly cadence (≥ 28 days → fire critic)
last_calibration_at: ""        # event-driven (every 10th ship) — also captured here for telemetry

# Optional integrations status — Phase 0 self-checks these on startup
# and degrades gracefully when they're absent or broken.
gh_available: true           # `gh auth status` ok this run
playwright_available: true   # capture-ship.mjs wrote press-desktop + press-mobile under 106498a/
lighthouse_available: unknown  # perf-a11y skipped lighthouse (CSS-only ship, mid-page surface — poor signal-to-cost)
sotd_parser_available: false   # sotd-compare.mjs: "could not parse SOTD entry — gallery markup may have changed" (still broken — re-investigation queued)

# Daily improvements.md archival check — Phase 0 reads size and rotates
# if exceeded. Recorded here so a freshly-archived run doesn't try again.
last_archival_at: ""
improvements_md_bytes: 176219

# Notion integration — fixed IDs for the BFS workspace surfaces. The
# routine reads Tasks at Phase 0 (task-driven mode override) and writes
# Reports at Phase 6 (one row per run, regardless of mode).
notion:
  bfs_page_id: "35faf8d3-d3e2-813e-a3f9-c18490bb175d"
  bfs_page_url: "https://www.notion.so/35faf8d3d3e2813ea3f9c18490bb175d"
  reports_data_source_id: "d5e22a6f-6794-411b-b959-12c6b1bdce5a"
  reports_database_id: "60cc3221-8e8a-42da-b926-20cd32d6c8bb"
  tasks_data_source_id: "2c089178-0df6-4757-97f9-6b8ce6a0f23b"
  tasks_database_id: "f0d21637-51a7-4748-89f7-e8fedff3cb87"
  projects_data_source_id: "256af8d3-d3e2-805a-affe-000ba3c6f3f9"
  mcp_server_prefix: "mcp__625e67a9-bbc3-4f5e-b0ed-f5619218dd84__"
  available: true     # MCP fallback used this run (NOTION_TOKEN not set)
