# Meta-state for the improvement-cycle routine.
#
# Updated at the end of every run (Phase 6) — never by hand. The hourly
# routine reads this at Phase 0 to decide which periodic sub-routines
# (retro, critic, calibration, creativity-reset) are due to fire.
#
# Dates are ISO-8601 (date or datetime). Counters are integers.

version: 1

# Last-run telemetry — written at the end of every run.
last_run_at: 2026-05-14T08:30:00Z
last_run_commit: 61bd74e
last_run_mode: shipped   # shipped | no-focus | pr-opened

# Anti-stagnation — incremented on every no-focus run, reset to 0 on ship.
# When this hits >= 2, Phase 0 fires the creativity-reset agent before
# the historian dispatches.
consecutive_no_focus_runs: 0

# Shipped-count — incremented on every shipped (not no-focus) run.
# When this becomes a multiple of 10, Phase 0 fires the rubric-calibrator.
shipped_count: 34   # +1: cookie-banner-subtask direct-to-main (task-driven [2/2] of legal-pages parent split, medium risk — Notion subtask 360af8d3-d3e2-81a8-a643-e546ec8038de of parent 35faf8d3-d3e2-817b-a559-eb8ffdb7938b "Add legal pages + GDPR-compliant cookie banner"; this run completes the parent — both [1/2] legal pages and [2/2] cookie banner now Done; new sitewide chrome client component src/components/cookie-banner.tsx (98 LOC) mounted in layout.tsx between CartDrawer and Analytics; uses useSyncExternalStore w/ "unknown" server snapshot so SSR renders nothing and the banner only paints after hydration confirms no localStorage('bfs-cookie-consent') flag; magnetic-wrapped Essentials only + Accept all buttons in italic-serif on a backdrop-blur bottom-edge wash at z-75 above folio z-70 and below cart-drawer z-80 so an open cart's scrim covers the consent strip during in-progress purchases; cross-tab sync via window 'storage' event listener; Escape → declined; first button auto-focused 60ms after mount; 320ms cookie-banner-rise slide animation gated on prefers-reduced-motion; mobile <720px stacks copy+buttons to single column with full-width touch targets; CSS at globals.css:7212-7365 (~150 LOC); SSR regression spot-check PASS 8/8 routes (banner absent in all 8, all adjacent chrome intact); net diff 3 files +263/0 LOC; build clean (27/27 static routes, same as prior ship), 0 anti-patterns; rubric T2 M2 L2 I2 A3 D2 = 13/18 Distinctive; 8 follow-ups uncovered (5 from Phase 5: focus-ring-token + ghost-border-contrast + color-tokenize + zindex-token-sweep + mobile-magnet-offset; 3 from Step 7.5 review: storage-key-filter + aria-live + escape-input-gate); parent task functionally complete with both subtasks Done in 2 cleanly-scoped commits 53e90aa + 61bd74e rather than one sprawling diff)

# Periodic cron triggers — Phase 0 compares against today's date and
# fires the corresponding agent when the gap exceeds the cadence.
last_retro_at: 2026-05-13      # weekly cadence (≥ 7 days since last run → fire retro)
last_critic_at: 2026-05-13     # monthly cadence (≥ 28 days → fire critic)
last_calibration_at: 2026-05-14   # event-driven (every 10th ship) — fired yesterday's run; next at shipped_count=40

# Optional integrations status — Phase 0 self-checks these on startup
# and degrades gracefully when they're absent or broken.
gh_available: true           # `gh auth status` ok this run
playwright_available: true   # capture-ship.mjs wrote cookie-banner-desktop + cookie-banner-mobile under 75b8776/ (prior SHA — screenshots dir is gitignored, informational; banner not visible in screenshots because SSR renders null + Playwright capture races the client-mount, but the run still confirms playwright + dev server health)
lighthouse_available: unknown  # perf-a11y skipped lighthouse (content-only adjacent surfaces; banner SSRs to null; signal-to-cost poor for this band)
sotd_parser_available: false   # sotd-compare.mjs: "could not parse SOTD entry — gallery markup may have changed" (still broken — sotd-parser-fix backlog item open)

# Daily improvements.md archival check — Phase 0 reads size and rotates
# if exceeded. Recorded here so a freshly-archived run doesn't try again.
last_archival_at: ""
improvements_md_bytes: 205000   # approx after this run's entry; just over 200KB threshold — archive-improvements.mjs will rotate >60d entries on next run if any qualify

