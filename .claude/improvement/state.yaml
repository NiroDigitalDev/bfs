# Meta-state for the improvement-cycle routine.
#
# Updated at the end of every run (Phase 6) — never by hand. The hourly
# routine reads this at Phase 0 to decide which periodic sub-routines
# (retro, critic, calibration, creativity-reset) are due to fire.
#
# Dates are ISO-8601 (date or datetime). Counters are integers.

version: 1

# Last-run telemetry — written at the end of every run.
last_run_at: 2026-05-14T09:45:00Z
last_run_commit: e1f0743
last_run_mode: shipped   # shipped | no-focus | pr-opened

# Anti-stagnation — incremented on every no-focus run, reset to 0 on ship.
# When this hits >= 2, Phase 0 fires the creativity-reset agent before
# the historian dispatches.
consecutive_no_focus_runs: 0

# Shipped-count — incremented on every shipped (not no-focus) run.
# When this becomes a multiple of 10, Phase 0 fires the rubric-calibrator.
shipped_count: 35   # +1: cart-autoopen-drawer-and-live-region direct-to-main (task-driven, medium risk — Notion page 35faf8d3-d3e2-810a-8c09-c05c76894f56 "When AddToCart commits an item, auto-open the cart drawer"); behavior-only ship that wires `cart.open()` after `cart.add(...)` in both AddToCart and PDPAddToCart handlers (+2 LOC in cart-island.tsx) and adds a polite `<span class="sr-only" role="status" aria-live="polite" aria-atomic="true">` as a Fragment-sibling outside the aria-hidden cart-drawer-root, with a new useEffect listener for cart.ADD_EVT setting `announce = "Added <productTitle> to cart."` and a 4000ms clear-timer (+24/-2 LOC in cart-drawer.tsx); zero new CSS (reuses .sr-only at globals.css:97), zero new keyframes (reuses existing drawer slide-in already prefers-reduced-motion-gated), zero new deps; pattern matches existing precedent at checkout-form.tsx:121 (always-mounted empty-string polite region, not conditional render — AT only watches existing live regions for mutations); regression-spotter verified empty `<span class="sr-only" role="status" aria-live="polite" aria-atomic="true"></span>` present as direct sibling immediately before cart-drawer-root on all 13/13 prerendered shell-bearing pages (homepage, 6 PDPs, /journal + post, /checkout, /privacy/terms/cookies), with empty SSR content and `data-open="false"` on every drawer; cart.add → ADD_EVT and cart.open → OPEN_EVT both dispatch synchronously in the same microtask so React batches both setStates into one render and AT perceives drawer-slide-in + polite announcement in parallel; idempotent setOpen(true) means re-adds while already-open are React no-ops for animation (acceptance criterion satisfied); returnFocusRef captures document.activeElement BEFORE setOpen flips so the AddToCart button is still focused at capture-time → close restores focus to the trigger; verified — bun run lint 0 errors + 7 pre-existing tooling warnings, bunx tsc --noEmit clean, bun run build 27/27 static routes (same count as prior ship, drawer SSRs closed everywhere), regression PASS 13/13 routes, perf-a11y PASS (<1KB gzipped client delta, no LCP/CLS/INP risk, .sr-only is not focusable so tab order preserved), diff-reviewer PASS-WITH-NITS (3 findings all logged as follow-ups: cart-announce-ttl-token medium [tokenize 4000ms + pre-existing 1800ms cart-island timers], cart-drawer-fragment-indent low [cosmetic re-indent on next CartDrawer touch], cart-add-double-announce low [verify dual-announce w/ CartCount aria-live]), Step 7.5 review skill clean — no new findings; 0 anti-patterns; rubric T:0 M:1 L:1 I:0 A:3 D:0 = 5/18 (behavior-only — a11y is the entire point, not a visual moment); pairs the previously-open `add-to-cart-no-live-announcement` follow-up into the same ship per the task brief's explicit recommendation

# Periodic cron triggers — Phase 0 compares against today's date and
# fires the corresponding agent when the gap exceeds the cadence.
last_retro_at: 2026-05-13      # weekly cadence (≥ 7 days since last run → fire retro)
last_critic_at: 2026-05-13     # monthly cadence (≥ 28 days → fire critic)
last_calibration_at: 2026-05-14   # event-driven (every 10th ship) — fired yesterday's run; next at shipped_count=40

# Optional integrations status — Phase 0 self-checks these on startup
# and degrades gracefully when they're absent or broken.
gh_available: true           # `gh auth status` ok this run
playwright_available: true   # capture-ship.mjs wrote cookie-banner-desktop + cookie-banner-mobile under 75b8776/ (prior SHA — screenshots dir is gitignored, informational; banner not visible in screenshots because SSR renders null + Playwright capture races the client-mount, but the run still confirms playwright + dev server health)
lighthouse_available: unknown  # perf-a11y skipped lighthouse (content-only adjacent surfaces; banner SSRs to null; signal-to-cost poor for this band)
sotd_parser_available: false   # sotd-compare.mjs: "could not parse SOTD entry — gallery markup may have changed" (still broken — sotd-parser-fix backlog item open)

# Daily improvements.md archival check — Phase 0 reads size and rotates
# if exceeded. Recorded here so a freshly-archived run doesn't try again.
last_archival_at: ""
improvements_md_bytes: 205000   # approx after this run's entry; just over 200KB threshold — archive-improvements.mjs will rotate >60d entries on next run if any qualify

