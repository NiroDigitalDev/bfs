# Periodic cron triggers — Phase 0 compares against today's date and
# fires the corresponding agent when the gap exceeds the cadence.
last_retro_at: 2026-05-13      # weekly cadence (≥ 7 days since last run → fire retro)
last_critic_at: 2026-05-13     # monthly cadence (≥ 28 days → fire critic)
last_calibration_at: 2026-05-14   # event-driven (every 10th ship) — fired 2026-05-14 morning run; next at shipped_count=40

# Optional integrations status — Phase 0 self-checks these on startup
# and degrades gracefully when they're absent or broken.
gh_available: true           # `gh auth status` ok this run — used for PR open + auto-merge
playwright_available: unknown  # capture-ship skipped this run (no playwright assumed; SSR class-grep was the stronger evidence and screenshots dir is gitignored regardless)
lighthouse_available: unknown  # perf-a11y skipped lighthouse (new editorial route with type-only content + reused primitives — no LCP/CLS/INP delta risk; signal-to-cost poor for this band)
sotd_parser_available: false   # sotd-compare.mjs still broken — sotd-parser-fix backlog item open

# Daily improvements.md archival check — Phase 0 reads size and rotates
# if exceeded. Recorded here so a freshly-archived run doesn't try again.
last_archival_at: ""
improvements_md_bytes: 233000   # approx after this run's entry; >200KB threshold — archive-improvements.mjs will rotate >60d entries on next run if any qualify (nothing old enough today: oldest entries are 2026-05-12, only 2 days old)

